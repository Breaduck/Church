<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>정다운교회 관리자</title>
  <link rel="icon" href="/img/logo.jpg" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    :root {
      --accent: #3d7a56;
      --accent-dim: rgba(61, 122, 86, 0.10);
      --ink: #17201b;
      --muted: #6b7a70;
      --line: #e3e8e4;
      --surf: #f3f7f5;
      --r: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--surf);
      color: var(--ink);
      font-size: 16px;
    }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 56px 48px 100px; }
    h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 6px; }
    .sub { color: var(--muted); font-size: 1rem; margin: 0; }

    /* Login */
    #login-view { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card {
      width: 100%; max-width: 400px;
      background: #fff; border-radius: 20px; padding: 52px 44px;
      box-shadow: 0 12px 44px rgba(0,0,0,0.10);
    }
    .login-card h1 { text-align: center; margin-bottom: 32px; font-size: 1.5rem; }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 0.92rem; font-weight: 700; margin-bottom: 8px; color: var(--muted); }
    .field input, .field textarea, .field select {
      width: 100%; height: 48px; padding: 0 16px; border: 1.5px solid var(--line); border-radius: 10px;
      font-family: inherit; font-size: 1rem; background: #fff; color: var(--ink);
      transition: border-color 0.15s;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      outline: none; border-color: var(--accent);
    }
    .field textarea { height: auto; padding: 12px 16px; resize: vertical; min-height: 90px; line-height: 1.6; }
    .field input[type="date"] { cursor: pointer; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      height: 52px; padding: 0 28px; border-radius: 10px; border: none;
      background: var(--accent); color: #fff; font-weight: 700; font-size: 1.02rem;
      cursor: pointer; width: 100%; text-decoration: none;
      transition: background 0.15s, transform 0.15s;
    }
    .btn:hover { background: #2e6040; }
    .btn:active { transform: scale(0.98); }
    .btn.secondary { background: #fff; color: var(--ink); border: 1.5px solid var(--line); width: auto; }
    .btn.secondary:hover { background: var(--surf); }
    .btn.danger { background: #fff; color: #c0392b; border: 1.5px solid #f0d0cc; width: auto; height: 40px; padding: 0 18px; font-size: 0.92rem; }
    .error { color: #c0392b; font-size: 0.92rem; margin-top: 14px; text-align: center; }

    /* App */
    #app-view { display: none; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px; padding-bottom: 28px; border-bottom: 1.5px solid var(--line);
    }
    .topbar-actions { display: flex; gap: 10px; }
    .topbar-actions .btn { height: 44px; font-size: 0.95rem; padding: 0 20px; }

    .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 14px; }
    .toolbar-right { display: flex; align-items: center; gap: 14px; }
    .quick-add {
      height: 44px; padding: 0 22px; border-radius: 999px; border: none;
      background: var(--accent); color: #fff; font-size: 0.95rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      box-shadow: 0 4px 14px rgba(61,122,86,0.35); flex-shrink: 0; font-family: inherit;
      transition: background 0.15s, transform 0.15s;
    }
    .quick-add:hover { background: #2e6040; transform: scale(1.03); }
    .tabs { display: flex; gap: 10px; }
    .tab {
      padding: 13px 26px; border-radius: 999px; border: 1.5px solid var(--line);
      background: #fff; cursor: pointer; font-weight: 700; font-size: 1rem; color: var(--muted);
      transition: all 0.15s;
    }
    .tab:hover { border-color: var(--accent); color: var(--accent); }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .view-toggle { display: flex; gap: 4px; background: #fff; border: 1.5px solid var(--line); border-radius: 12px; padding: 4px; }
    .view-toggle button {
      border: none; background: transparent; cursor: pointer;
      padding: 9px 16px; border-radius: 8px; font-size: 0.9rem; font-weight: 700; color: var(--muted);
      display: inline-flex; align-items: center; gap: 6px; font-family: inherit;
    }
    .view-toggle button.active { background: var(--accent); color: #fff; }

    .panel { display: none; }
    .panel.active { display: block; }
    .list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 20px; }
    #app-view.view-list .list-grid { grid-template-columns: 1fr; }

    .add-card {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; min-height: 320px;
      border: 2.5px dashed var(--line); border-radius: var(--r);
      background: transparent; cursor: pointer; color: var(--muted);
      font-weight: 700; font-size: 1.05rem; width: 100%;
      transition: all 0.15s;
    }
    .add-card:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    #app-view.view-list .add-card { display: none; }
    .add-card .plus { font-size: 2.6rem; line-height: 1; font-weight: 300; }

    .card {
      background: #fff; border-radius: var(--r); padding: 28px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.06);
      border: 1px solid var(--line);
    }
    .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 12px; }
    .card-head span {
      font-size: 0.85rem; color: var(--accent); font-weight: 800;
      background: var(--accent-dim); padding: 5px 12px; border-radius: 999px;
    }
    .card-head-actions { display: flex; align-items: center; gap: 8px; }
    .card-head-actions .btn { width: auto; height: 36px; padding: 0 18px; font-size: 0.88rem; }
    .card-head-actions .btn.danger { height: 36px; padding: 0 16px; font-size: 0.85rem; }
    .card-head-left { display: flex; align-items: center; gap: 10px; }
    .drag-handle {
      cursor: grab; color: var(--muted); font-size: 1.1rem; line-height: 1;
      padding: 4px 2px; user-select: none;
    }
    .drag-handle:active { cursor: grabbing; }
    .card.dragging { opacity: 0.4; }
    .card.drag-over { outline: 2.5px dashed var(--accent); outline-offset: 4px; }
    .card-head-actions .btn.preview-btn { background: #fff; color: var(--ink); border: 1.5px solid var(--line); }
    .card-head-actions .btn.preview-btn:hover { background: var(--surf); }

    /* 미리보기 팝업 */
    .preview-modal {
      position: fixed; inset: 0; z-index: 500;
      display: none; align-items: center; justify-content: center; padding: 30px;
    }
    .preview-modal.open { display: flex; }
    .preview-modal-backdrop { position: absolute; inset: 0; background: rgba(20, 24, 22, 0.68); backdrop-filter: blur(2px); }
    .preview-modal-inner {
      position: relative; width: min(760px, 100%); max-height: 90vh;
      background: #fff; border-radius: 18px; overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
      display: flex; flex-direction: column;
    }
    .preview-modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 22px; border-bottom: 1px solid var(--line); flex-shrink: 0;
    }
    .preview-modal-head h3 { margin: 0; font-size: 1.05rem; font-weight: 800; }
    .preview-modal-head span { font-size: 0.85rem; color: var(--muted); font-weight: 500; }
    .preview-modal-close {
      width: 32px; height: 32px; border-radius: 50%; border: none;
      background: var(--surf); color: var(--ink); cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
      transition: background 0.15s;
    }
    .preview-modal-close:hover { background: var(--line); }
    .preview-modal-body { overflow-y: auto; background: var(--surf); flex: 1; }
    .preview-modal-body iframe { width: 100%; border: none; display: block; background: var(--surf); }

    .card-summary { display: none; }
    #app-view.view-list .card-summary {
      display: flex; align-items: center; justify-content: space-between; gap: 14px;
      cursor: pointer; user-select: none;
    }
    #app-view.view-list .card-summary-title {
      font-weight: 700; font-size: 1.05rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #app-view.view-list .card-summary-meta { display: flex; align-items: center; gap: 12px; flex-shrink: 0; color: var(--muted); font-size: 0.9rem; }
    #app-view.view-list .card-summary-chevron { transition: transform 0.2s; color: var(--muted); }
    #app-view.view-list .card.expanded .card-summary-chevron { transform: rotate(180deg); }
    #app-view.view-list .card-fields { display: none; margin-top: 20px; }
    #app-view.view-list .card.expanded .card-fields { display: block; }
    #app-view.view-list .card-summary { margin-bottom: 4px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .tag-custom { margin-top: 8px; }

    .thumb-wrap { position: relative; display: inline-block; margin-top: 10px; }
    .thumb { width: 100%; max-width: 220px; border-radius: 10px; display: none; }
    .thumb-del {
      position: absolute; top: 6px; right: 6px;
      width: 28px; height: 28px; border-radius: 50%; border: none;
      background: rgba(20,20,20,0.68); color: #fff; cursor: pointer;
      display: none; align-items: center; justify-content: center; font-size: 1rem; line-height: 1;
      opacity: 0; transition: opacity 0.15s;
    }
    .thumb-wrap:hover .thumb-del { opacity: 1; }
    .thumbs { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .thumbs:empty { margin-top: 0; }
    .thumbs .thumb-wrap { margin-top: 0; }
    .thumbs .thumb { width: 96px; height: 96px; object-fit: cover; max-width: none; display: block; }
    .thumbs .thumb-del { display: flex; }
    .thumb-wrap.processing .thumb { opacity: 0.5; }
    .thumb-wrap.processing::after {
      content: ''; position: absolute; inset: 0; margin: auto; width: 20px; height: 20px;
      border: 2.5px solid rgba(61,122,86,0.25); border-top-color: var(--accent);
      border-radius: 50%; animation: thumb-spin 0.7s linear infinite; pointer-events: none;
    }
    @keyframes thumb-spin { to { transform: rotate(360deg); } }
    .img-hint { font-size: 0.82rem; color: var(--muted); margin-top: 8px; }
    .img-hint:empty { display: none; }

    .card-footer { margin-top: 14px; }
    .save-status { font-size: 0.85rem; }
    .save-status.ok { color: var(--accent); font-weight: 700; }
    .save-status.err { color: #c0392b; font-weight: 700; }

    .toast {
      position: fixed; top: 28px; left: 50%; transform: translateX(-50%);
      z-index: 999; padding: 16px 28px; border-radius: 12px;
      font-weight: 700; font-size: 1rem; color: #fff;
      background: var(--accent); box-shadow: 0 8px 28px rgba(0,0,0,0.18);
      animation: toast-in 0.2s ease;
    }
    .toast.err { background: #c0392b; }
    @keyframes toast-in { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  </style>
</head>
<body>

  <div id="login-view">
    <div class="login-card">
      <h1>정다운교회 관리자</h1>
      <form id="login-form">
        <div class="field">
          <label>아이디</label>
          <input type="text" id="login-username" autocomplete="username" required />
        </div>
        <div class="field">
          <label>비밀번호</label>
          <input type="password" id="login-password" autocomplete="current-password" required />
        </div>
        <button class="btn" type="submit">로그인</button>
        <p class="error" id="login-error" style="display:none;"></p>
      </form>
    </div>
  </div>

  <div id="app-view" class="view-list">
    <div id="toast" class="toast" hidden></div>

    <div class="preview-modal" id="preview-modal">
      <div class="preview-modal-backdrop" data-preview-close></div>
      <div class="preview-modal-inner">
        <div class="preview-modal-head">
          <div><h3>미리보기</h3><span>실제 사이트에 이렇게 표시돼요 (기존 항목과 함께 보여드려요)</span></div>
          <button type="button" class="preview-modal-close" id="preview-modal-close" aria-label="닫기">×</button>
        </div>
        <div class="preview-modal-body"><iframe id="preview-modal-frame"></iframe></div>
      </div>
    </div>

    <div class="wrap">
      <div class="topbar">
        <div>
          <h1>정다운교회 관리자</h1>
          <p class="sub">공지사항 · 교회소식을 수정하고 저장하면 사이트에 자동 반영됩니다.</p>
        </div>
        <div class="topbar-actions">
          <a href="/" class="btn secondary">홈으로 돌아가기</a>
          <button class="btn secondary" id="logout-btn">로그아웃</button>
        </div>
      </div>

      <div class="toolbar">
        <div class="tabs">
          <div class="tab active" data-tab="news">교회소식</div>
          <div class="tab" data-tab="notices">공지사항</div>
        </div>
        <div class="toolbar-right">
          <button type="button" class="quick-add" id="quick-add">+ 새 항목 추가하기</button>
          <div class="view-toggle">
            <button type="button" data-view="grid">⊞ 그리드</button>
            <button type="button" data-view="list" class="active">☰ 나열</button>
          </div>
        </div>
      </div>

      <div class="panel active" id="panel-news">
        <div id="news-list" class="list-grid"></div>
      </div>

      <div class="panel" id="panel-notices">
        <div id="notices-list" class="list-grid"></div>
      </div>
    </div>
  </div>

  <script>
    const loginView = document.getElementById('login-view');
    const appView = document.getElementById('app-view');

    async function checkSession() {
      try {
        const res = await fetch('/api/admin/session');
        const data = await res.json();
        return !!data.authenticated;
      } catch { return false; }
    }

    async function showApp() {
      loginView.style.display = 'none';
      appView.style.display = 'block';
      await Promise.all([loadNews(), loadNotices()]);
    }

    function showLogin() {
      loginView.style.display = 'flex';
      appView.style.display = 'none';
    }

    (async () => {
      if (await checkSession()) showApp(); else showLogin();
    })();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;
      const errEl = document.getElementById('login-error');
      errEl.style.display = 'none';
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '로그인 실패');
        showApp();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
      }
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/api/admin/logout', { method: 'POST' });
      showLogin();
    });

    // Tabs
    const quickAddBtn = document.getElementById('quick-add');
    const QUICK_ADD_LABELS = { news: '+ 새 교회소식 추가', notices: '+ 새 공지 추가' };
    function updateQuickAddLabel() {
      const activeTab = document.querySelector('.tab.active').dataset.tab;
      quickAddBtn.textContent = QUICK_ADD_LABELS[activeTab];
    }
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active');
        updateQuickAddLabel();
      });
    });
    updateQuickAddLabel();

    let toastTimer = null;
    function showToast(msg, type, duration) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast' + (type === 'err' ? ' err' : '');
      toast.hidden = false;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.hidden = true; }, duration || 2600);
    }

    // 날짜 칸 어디를 눌러도 달력이 뜨도록 (우측 달력 아이콘만이 아니라)
    document.addEventListener('click', e => {
      const el = e.target;
      if (el instanceof HTMLInputElement && el.type === 'date' && typeof el.showPicker === 'function') {
        try { el.showPicker(); } catch (_) {}
      }
    });

    function expandFirstCard(listId) {
      const firstCard = document.querySelector(`#${listId} .card`);
      if (firstCard) firstCard.classList.add('expanded');
    }

    document.getElementById('quick-add').addEventListener('click', () => {
      const activeTab = document.querySelector('.tab.active').dataset.tab;
      if (activeTab === 'news') {
        newsItems.unshift({ title: '', date: todayStr(), tag: '소식', image: '', body: '' });
        renderNews();
        expandFirstCard('news-list');
      } else {
        noticeItems.unshift({ title: '', date: todayStr(), image: '', body: '' });
        renderNotices();
        expandFirstCard('notices-list');
      }
    });

    // View toggle (그리드 / 나열)
    document.querySelectorAll('.view-toggle button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        appView.classList.toggle('view-list', btn.dataset.view === 'list');
      });
    });

    const bust = () => `?t=${Date.now()}`;
    const todayStr = () => new Date().toISOString().slice(0, 10);
    const fmtDateKo = iso => {
      const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(iso || '');
      return m ? `${m[1]}. ${m[2]}. ${m[3]}` : (iso || '');
    };
    const TAG_PRESETS = ['공지', '행사', '선교', '교육', '소식'];

    const MAX_IMAGES = 10;

    // 이전 데이터(단일 image) 및 신규 데이터(images 배열) 모두 지원
    function getImages(item) {
      if (Array.isArray(item.images) && item.images.length) return item.images.filter(Boolean);
      return item.image ? [item.image] : [];
    }

    // 세로 사진 등 잘리는 사진의 노출 위치(object-position) — 이미지 경로별로 저장
    function getImagePos(item, src) {
      return (item.imagePos && item.imagePos[src]) || '50% 50%';
    }
    function setImagePos(item, src, pos) {
      item.imagePos = item.imagePos || {};
      item.imagePos[src] = pos;
    }

    function toJpgName(name) {
      return (name || 'image').replace(/\.[^.]+$/, '') + '.jpg';
    }

    // 업로드 전 이미지 리사이즈·압축 (긴 변 1600px, JPEG) —
    // 폰 사진 용량이 커서 업로드가 실패하며 빨간 오류가 뜨던 문제를 방지하고 사이트도 빨라짐.
    function compressImage(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
          URL.revokeObjectURL(url);
          const MAXDIM = 1600;
          let { width, height } = img;
          if (Math.max(width, height) > MAXDIM) {
            const s = MAXDIM / Math.max(width, height);
            width = Math.round(width * s);
            height = Math.round(height * s);
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
          resolve({ dataUrl, base64: dataUrl.split(',')[1] });
        };
        img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('이미지를 불러오지 못했습니다.')); };
        img.src = url;
      });
    }

    // 카드별 다중 이미지 첨부 UI (최대 10장) — 교회소식·공지사항 공용
    function attachImageUploader(card, item) {
      const fileInput = card.querySelector('[data-field="imageFile"]');
      const thumbsWrap = card.querySelector('[data-thumbs]');
      const hintEl = card.querySelector('[data-img-hint]');
      if (!Array.isArray(item.images)) item.images = item.image ? [item.image] : [];
      item._pending = item._pending || [];

      const total = () => item.images.length + item._pending.length;

      function makeThumb(src, onDel, processing) {
        const wrap = document.createElement('div');
        wrap.className = 'thumb-wrap' + (processing ? ' processing' : '');
        const img = document.createElement('img');
        img.className = 'thumb';
        img.src = src;
        const del = document.createElement('button');
        del.type = 'button';
        del.className = 'thumb-del';
        del.title = '사진 삭제';
        del.textContent = '×';
        del.addEventListener('click', onDel);
        wrap.append(img, del);
        return wrap;
      }

      function render() {
        thumbsWrap.innerHTML = '';
        item.images.forEach((src, idx) => {
          thumbsWrap.appendChild(makeThumb(src, () => { item.images.splice(idx, 1); render(); }));
        });
        item._pending.forEach((p, idx) => {
          thumbsWrap.appendChild(makeThumb(p.dataUrl, () => { item._pending.splice(idx, 1); render(); }, p.processing));
        });
        const n = total();
        hintEl.textContent = n ? `${n} / ${MAX_IMAGES}장` : '';
        fileInput.disabled = n >= MAX_IMAGES;
      }

      // 선택 즉시 원본 미리보기(objectURL)를 먼저 보여주고, 압축은 뒤에서 진행 —
      // 큰 사진 압축을 기다리는 동안 화면이 빈 채로 있는 것처럼 보이던 문제 방지.
      fileInput.addEventListener('change', () => {
        const files = Array.from(fileInput.files || []);
        fileInput.value = '';
        for (const file of files) {
          if (total() >= MAX_IMAGES) {
            showToast(`이미지는 최대 ${MAX_IMAGES}장까지 첨부할 수 있어요.`, 'err');
            break;
          }
          const entry = { dataUrl: URL.createObjectURL(file), base64: null, name: toJpgName(file.name), processing: true };
          entry.ready = compressImage(file).then(({ dataUrl, base64 }) => {
            URL.revokeObjectURL(entry.dataUrl);
            entry.dataUrl = dataUrl;
            entry.base64 = base64;
            entry.processing = false;
            render();
          }).catch(err => {
            const idx = item._pending.indexOf(entry);
            if (idx !== -1) item._pending.splice(idx, 1);
            render();
            showToast(err.message || '이미지 처리 실패', 'err');
          });
          item._pending.push(entry);
        }
        render();
      });

      render();
    }

    async function uploadPendingFiles(item) {
      if (!Array.isArray(item.images)) item.images = item.image ? [item.image] : [];
      if (!item._pending || !item._pending.length) return;
      await Promise.all(item._pending.map(p => p.ready || Promise.resolve()));
      for (const p of item._pending) {
        if (!p.base64) continue;
        const res = await fetch('/api/admin/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filename: p.name, dataBase64: p.base64 })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '이미지 업로드 실패');
        item.images.push(data.path);
        if (item.imagePos && item.imagePos[p.dataUrl]) {
          item.imagePos[data.path] = item.imagePos[p.dataUrl];
          delete item.imagePos[p.dataUrl];
        }
      }
      item._pending = [];
    }

    // 미리보기 팝업 안 사진(대표 사진)을 드래그해서 노출 위치(object-position)를 조정.
    // 세로 사진처럼 가로로 긴 박스에 잘려 보일 때, 어느 부분이 보일지 직접 끌어서 정할 수 있다.
    function wirePreviewDrag(doc, item) {
      const els = Array.from(doc.querySelectorAll('img.posable'));
      if (!els.length) return;
      let dragging = false, activeSrc = null, rect = null, startX = 0, startY = 0, startPos = { x: 50, y: 50 };

      const syncGroup = (src, val) => {
        els.forEach(el => { if (el.getAttribute('src') === src) el.style.objectPosition = val; });
      };

      els.forEach(el => {
        el.addEventListener('pointerdown', e => {
          dragging = true;
          activeSrc = el.getAttribute('src');
          rect = el.getBoundingClientRect();
          const [px, py] = getImagePos(item, activeSrc).split(' ').map(v => parseFloat(v));
          startPos = { x: px, y: py };
          startX = e.clientX;
          startY = e.clientY;
          el.classList.add('dragging-pos');
          try { el.setPointerCapture(e.pointerId); } catch (_) {}
          e.preventDefault();
        });
        el.addEventListener('pointermove', e => {
          if (!dragging || el.getAttribute('src') !== activeSrc) return;
          const dx = e.clientX - startX;
          const dy = e.clientY - startY;
          const xPct = Math.max(0, Math.min(100, startPos.x - (dx / rect.width) * 100));
          const yPct = Math.max(0, Math.min(100, startPos.y - (dy / rect.height) * 100));
          const val = `${Math.round(xPct)}% ${Math.round(yPct)}%`;
          setImagePos(item, activeSrc, val);
          syncGroup(activeSrc, val);
        });
        const end = () => { dragging = false; el.classList.remove('dragging-pos'); };
        el.addEventListener('pointerup', end);
        el.addEventListener('pointercancel', end);
        el.addEventListener('dblclick', () => {
          const src = el.getAttribute('src');
          setImagePos(item, src, '50% 50%');
          syncGroup(src, '50% 50%');
        });
      });
    }

    function attachPreview(card, item, getItems, buildSrcdoc) {

      btn.addEventListener('click', () => {

        };

        previewModal.classList.add('open');

              <div class="card-head-actions">
                <button class="btn preview-btn" data-preview>미리보기</button>
                <button class="btn" data-save>저장</button>
                <button class="btn danger" data-i="${i}">삭제</button>
              </div>
            </div>
            <div class="field"><label>제목</label><input type="text" data-field="title" value="${escapeAttr(item.title || '')}" /></div>
            <div class="field"><label>날짜</label><input type="date" data-field="date" value="${escapeAttr(item.date || '')}" /></div>
            <div class="field">
              <label>사진 (최대 10장, 선택)</label>
              <input type="file" accept="image/*" multiple data-field="imageFile" />
              <div class="thumbs" data-thumbs></div>
              <p class="img-hint" data-img-hint></p>
            </div>
            <div class="field"><label>내용 (선택)</label><textarea data-field="body">${escapeHtml(item.body || '')}</textarea></div>
            <div class="card-footer">
              <span class="save-status"></span>
            </div>
          </div>
        `;
        const summaryTitle = card.querySelector('.card-summary-title');
        const summaryDate = card.querySelector('.card-summary-meta span');
        card.querySelector('[data-toggle]').addEventListener('click', () => card.classList.toggle('expanded'));
        card.querySelector('[data-i]').addEventListener('click', async () => {
          if (!confirm('삭제하시겠습니까?')) return;
          noticeItems.splice(i, 1);
          renderNotices();
          try {
            await persistNotices();
            showToast('삭제되었습니다.');
          } catch (err) {
            showToast('삭제 저장 중 오류: ' + err.message, 'err');
          }
        });
        card.querySelector('[data-field="title"]').addEventListener('input', e => { item.title = e.target.value; summaryTitle.textContent = item.title || '제목을 입력해주세요'; });
        card.querySelector('[data-field="date"]').addEventListener('input', e => { item.date = e.target.value; summaryDate.textContent = item.date; });
        card.querySelector('[data-field="body"]').addEventListener('input', e => item.body = e.target.value);

        attachImageUploader(card, item);

        const statusEl = card.querySelector('.save-status');
        card.querySelector('[data-save]').addEventListener('click', () => saveNotices(statusEl));

        attachDragReorder(card, i, noticeItems, renderNotices);
        attachPreview(card, item, () => noticeItems, buildNoticePreviewSrcdoc);

        list.appendChild(card);
      });

      list.appendChild(makeAddCard('새 공지 추가', () => {
        noticeItems.unshift({ title: '', date: todayStr(), image: '', body: '' });
        renderNotices();
        expandFirstCard('notices-list');
      }));
    }

    async function persistNotices() {
      for (const item of noticeItems) await uploadPendingFiles(item);
      const clean = noticeItems.map(item => {
        const images = getImages(item);
        return { title: item.title || '', date: item.date || '', image: images[0] || '', images, imagePos: item.imagePos || {}, body: item.body || '' };
      });
      const res = await fetch('/api/admin/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ collection: 'notices', items: clean })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '저장 실패');
    }

    async function saveNotices(statusEl) {
      statusEl.textContent = '저장 중...'; statusEl.className = 'save-status';
      try {
        await persistNotices();
        statusEl.textContent = ''; statusEl.className = 'save-status';
        showToast('저장이 완료되었습니다. 사이트 반영까지 1~2분 정도 걸릴 수 있어요.', null, 3800);
      } catch (err) {
        statusEl.textContent = ''; statusEl.className = 'save-status';
        showToast(err.message, 'err');
      }
    }

    // ---- helpers ----
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }
    function escapeAttr(s) { return escapeHtml(s); }
    function readAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    async function readAsBase64(file) {
      const dataUrl = await readAsDataURL(file);
      return dataUrl.split(',')[1];
    }
  </script>
</body>
</html>
