<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>정다운교회 관리자</title>
  <link rel="icon" href="/img/logo.jpg" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    :root {
      --accent: #3d7a56;
      --accent-dim: rgba(61, 122, 86, 0.10);
      --ink: #17201b;
      --muted: #6b7a70;
      --line: #e3e8e4;
      --surf: #f3f7f5;
      --r: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--surf);
      color: var(--ink);
      font-size: 16px;
    }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 56px 48px 100px; }
    h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 6px; }
    .sub { color: var(--muted); font-size: 1rem; margin: 0; }

    /* Login */
    #login-view { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card {
      width: 100%; max-width: 400px;
      background: #fff; border-radius: 20px; padding: 52px 44px;
      box-shadow: 0 12px 44px rgba(0,0,0,0.10);
    }
    .login-card h1 { text-align: center; margin-bottom: 32px; font-size: 1.5rem; }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 0.92rem; font-weight: 700; margin-bottom: 8px; color: var(--muted); }
    .field input, .field textarea, .field select {
      width: 100%; height: 48px; padding: 0 16px; border: 1.5px solid var(--line); border-radius: 10px;
      font-family: inherit; font-size: 1rem; background: #fff; color: var(--ink);
      transition: border-color 0.15s;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      outline: none; border-color: var(--accent);
    }
    .field textarea { height: auto; padding: 12px 16px; resize: vertical; min-height: 90px; line-height: 1.6; }
    .field input[type="date"] { cursor: pointer; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      height: 52px; padding: 0 28px; border-radius: 10px; border: none;
      background: var(--accent); color: #fff; font-weight: 700; font-size: 1.02rem;
      cursor: pointer; width: 100%; text-decoration: none;
      transition: background 0.15s, transform 0.15s;
    }
    .btn:hover { background: #2e6040; }
    .btn:active { transform: scale(0.98); }
    .btn.secondary { background: #fff; color: var(--ink); border: 1.5px solid var(--line); width: auto; }
    .btn.secondary:hover { background: var(--surf); }
    .btn.danger { background: #fff; color: #c0392b; border: 1.5px solid #f0d0cc; width: auto; height: 40px; padding: 0 18px; font-size: 0.92rem; }
    .error { color: #c0392b; font-size: 0.92rem; margin-top: 14px; text-align: center; }

    /* App */
    #app-view { display: none; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px; padding-bottom: 28px; border-bottom: 1.5px solid var(--line);
    }
    .topbar-actions { display: flex; gap: 10px; }
    .topbar-actions .btn { height: 44px; font-size: 0.95rem; padding: 0 20px; }

    .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 14px; }
    .toolbar-right { display: flex; align-items: center; gap: 14px; }
    .quick-add {
      height: 44px; padding: 0 22px; border-radius: 999px; border: none;
      background: var(--accent); color: #fff; font-size: 0.95rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      box-shadow: 0 4px 14px rgba(61,122,86,0.35); flex-shrink: 0; font-family: inherit;
      transition: background 0.15s, transform 0.15s;
    }
    .quick-add:hover { background: #2e6040; transform: scale(1.03); }
    .tabs { display: flex; gap: 10px; }
    .tab {
      padding: 13px 26px; border-radius: 999px; border: 1.5px solid var(--line);
      background: #fff; cursor: pointer; font-weight: 700; font-size: 1rem; color: var(--muted);
      transition: all 0.15s;
    }
    .tab:hover { border-color: var(--accent); color: var(--accent); }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .view-toggle { display: flex; gap: 4px; background: #fff; border: 1.5px solid var(--line); border-radius: 12px; padding: 4px; }
    .view-toggle button {
      border: none; background: transparent; cursor: pointer;
      padding: 9px 16px; border-radius: 8px; font-size: 0.9rem; font-weight: 700; color: var(--muted);
      display: inline-flex; align-items: center; gap: 6px; font-family: inherit;
    }
    .view-toggle button.active { background: var(--accent); color: #fff; }

    .panel { display: none; }
    .panel.active { display: block; }
    .list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 20px; }
    #app-view.view-list .list-grid { grid-template-columns: 1fr; }

    .add-card {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; min-height: 320px;
      border: 2.5px dashed var(--line); border-radius: var(--r);
      background: transparent; cursor: pointer; color: var(--muted);
      font-weight: 700; font-size: 1.05rem; width: 100%;
      transition: all 0.15s;
    }
    .add-card:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    #app-view.view-list .add-card { display: none; }
    .add-card .plus { font-size: 2.6rem; line-height: 1; font-weight: 300; }

    .card {
      background: #fff; border-radius: var(--r); padding: 28px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.06);
      border: 1px solid var(--line);
    }
    .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 12px; }
    .card-head span {
      font-size: 0.85rem; color: var(--accent); font-weight: 800;
      background: var(--accent-dim); padding: 5px 12px; border-radius: 999px;
    }
    .card-head-actions { display: flex; align-items: center; gap: 8px; }
    .card-head-actions .btn { width: auto; height: 36px; padding: 0 18px; font-size: 0.88rem; }
    .card-head-actions .btn.danger { height: 36px; padding: 0 16px; font-size: 0.85rem; }
    .card-head-left { display: flex; align-items: center; gap: 10px; }
    .drag-handle {
      cursor: grab; color: var(--muted); font-size: 1.1rem; line-height: 1;
      padding: 4px 2px; user-select: none;
    }
    .drag-handle:active { cursor: grabbing; }
    .card.dragging { opacity: 0.4; }
    .card.drag-over { outline: 2.5px dashed var(--accent); outline-offset: 4px; }
    .card-head-actions .btn.preview-btn { background: #fff; color: var(--ink); border: 1.5px solid var(--line); }
    .card-head-actions .btn.preview-btn:hover { background: var(--surf); }

    /* 미리보기 팝업 */
    .preview-modal {
      position: fixed; inset: 0; z-index: 500;
      display: none; align-items: center; justify-content: center; padding: 30px;
    }
    .preview-modal.open { display: flex; }
    .preview-modal-backdrop { position: absolute; inset: 0; background: rgba(20, 24, 22, 0.68); backdrop-filter: blur(2px); }
    .preview-modal-inner {
      position: relative; width: min(1160px, 96vw); height: 92vh;
      background: #fff; border-radius: 18px; overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
      display: flex; flex-direction: column;
    }
    .preview-modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 22px; border-bottom: 1px solid var(--line); flex-shrink: 0;
    }
    .preview-modal-head h3 { margin: 0; font-size: 1.05rem; font-weight: 800; }
    .preview-modal-head span { font-size: 0.85rem; color: var(--muted); font-weight: 500; }
    .preview-modal-close {
      width: 32px; height: 32px; border-radius: 50%; border: none;
      background: var(--surf); color: var(--ink); cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
      transition: background 0.15s;
    }
    .preview-modal-close:hover { background: var(--line); }
    .preview-modal-body { overflow: hidden; background: var(--surf); flex: 1; min-height: 0; }
    .preview-modal-body iframe { width: 100%; height: 100%; border: none; display: block; background: var(--surf); }

    /* 사진 위치 조정 팝업 */
    .pos-modal {
      position: fixed; inset: 0; z-index: 600;
      display: none; align-items: center; justify-content: center; padding: 24px;
    }
    .pos-modal.open { display: flex; }
    .pos-modal-backdrop { position: absolute; inset: 0; background: rgba(20, 24, 22, 0.68); backdrop-filter: blur(2px); }
    .pos-modal-inner {
      position: relative; width: min(560px, 100%);
      background: #fff; border-radius: 18px; overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
    }
    .pos-modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--line);
    }
    .pos-modal-head h3 { margin: 0; font-size: 1.02rem; font-weight: 800; }
    .pos-modal-close {
      width: 30px; height: 30px; border-radius: 50%; border: none;
      background: var(--surf); color: var(--ink); cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 1.05rem;
      transition: background 0.15s;
    }
    .pos-modal-close:hover { background: var(--line); }
    .pos-frame { position: relative; width: 100%; aspect-ratio: 16 / 10; background: var(--surf); overflow: hidden; }
    .pos-frame img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      cursor: grab; touch-action: none; user-select: none; -webkit-user-drag: none;
    }
    .pos-frame img.dragging-pos { cursor: grabbing; }
    .pos-modal-hint { margin: 0; padding: 14px 20px 20px; color: var(--muted); font-size: 0.86rem; text-align: center; }

    .card-summary { display: none; }
    #app-view.view-list .card-summary {
      display: flex; align-items: center; justify-content: space-between; gap: 14px;
      cursor: pointer; user-select: none;
    }
    #app-view.view-list .card-summary-title {
      font-weight: 700; font-size: 1.05rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #app-view.view-list .card-summary-meta { display: flex; align-items: center; gap: 12px; flex-shrink: 0; color: var(--muted); font-size: 0.9rem; }
    #app-view.view-list .card-summary-chevron { transition: transform 0.2s; color: var(--muted); }
    #app-view.view-list .card.expanded .card-summary-chevron { transform: rotate(180deg); }
    #app-view.view-list .card-fields { display: none; margin-top: 20px; }
    #app-view.view-list .card.expanded .card-fields { display: block; }
    #app-view.view-list .card-summary { margin-bottom: 4px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .tag-custom { margin-top: 8px; }

    .thumb-wrap { position: relative; display: inline-block; margin-top: 10px; }
    .thumb { width: 100%; max-width: 220px; border-radius: 10px; display: none; }
    .thumb-del {
      position: absolute; top: 6px; right: 6px;
      width: 28px; height: 28px; border-radius: 50%; border: none;
      background: rgba(20,20,20,0.68); color: #fff; cursor: pointer;
      display: none; align-items: center; justify-content: center; font-size: 1rem; line-height: 1;
      opacity: 0; transition: opacity 0.15s;
    }
    .thumb-wrap:hover .thumb-del { opacity: 1; }
    .thumbs { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .thumbs:empty { margin-top: 0; }
    .thumbs .thumb-wrap { margin-top: 0; }
    .thumbs .thumb { width: 96px; height: 96px; object-fit: cover; max-width: none; display: block; }
    .thumbs .thumb-del { display: flex; }
    .thumb-wrap.processing .thumb { opacity: 0.5; }
    .thumb-wrap.processing::after {
      content: ''; position: absolute; inset: 0; margin: auto; width: 20px; height: 20px;
      border: 2.5px solid rgba(61,122,86,0.25); border-top-color: var(--accent);
      border-radius: 50%; animation: thumb-spin 0.7s linear infinite; pointer-events: none;
    }
    @keyframes thumb-spin { to { transform: rotate(360deg); } }
    .img-hint { font-size: 0.82rem; color: var(--muted); margin-top: 8px; }
    .img-hint:empty { display: none; }

    .card-footer { margin-top: 14px; }
    .save-status { font-size: 0.85rem; }
    .save-status.ok { color: var(--accent); font-weight: 700; }
    .save-status.err { color: #c0392b; font-weight: 700; }

    .toast {
      position: fixed; top: 28px; left: 50%; transform: translateX(-50%);
      z-index: 999; padding: 16px 28px; border-radius: 12px;
      font-weight: 700; font-size: 1rem; color: #fff;
      background: var(--accent); box-shadow: 0 8px 28px rgba(0,0,0,0.18);
      animation: toast-in 0.2s ease;
    }
    .toast.err { background: #c0392b; }
    @keyframes toast-in { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  </style>
</head>
<body>

  <div id="login-view">
    <div class="login-card">
      <h1>정다운교회 관리자</h1>
      <form id="login-form">
        <div class="field">
          <label>아이디</label>
          <input type="text" id="login-username" autocomplete="username" required />
        </div>
        <div class="field">
          <label>비밀번호</label>
          <input type="password" id="login-password" autocomplete="current-password" required />
        </div>
        <button class="btn" type="submit">로그인</button>
        <p class="error" id="login-error" style="display:none;"></p>
      </form>
    </div>
  </div>

  <div id="app-view" class="view-list">
    <div id="toast" class="toast" hidden></div>

    <div class="preview-modal" id="preview-modal">
      <div class="preview-modal-backdrop" data-preview-close></div>
      <div class="preview-modal-inner">
        <div class="preview-modal-head">
          <div><h3>미리보기</h3><span>실제 홈 화면에 노출되는 형태 그대로예요 (사진 클릭 시 상세 팝업도 실제와 동일)</span></div>
          <button type="button" class="preview-modal-close" id="preview-modal-close" aria-label="닫기">×</button>
        </div>
        <div class="preview-modal-body"><iframe id="preview-modal-frame"></iframe></div>
      </div>
    </div>

    <!-- 사진 위치 조정 팝업 (첨부한 사진 클릭 시) -->
    <div class="pos-modal" id="pos-modal">
      <div class="pos-modal-backdrop" data-pos-close></div>
      <div class="pos-modal-inner">
        <div class="pos-modal-head">
          <h3>사진 위치 조정</h3>
          <button type="button" class="pos-modal-close" id="pos-modal-close" aria-label="닫기">×</button>
        </div>
        <div class="pos-frame"><img id="pos-modal-img" alt="" /></div>
        <p class="pos-modal-hint">드래그해서 보이는 위치를 조정하세요 · 더블클릭하면 가운데로 초기화돼요</p>
      </div>
    </div>

    <div class="wrap">
      <div class="topbar">
        <div>
          <h1>정다운교회 관리자</h1>
          <p class="sub">공지사항 · 교회소식을 수정하고 저장하면 사이트에 자동 반영됩니다.</p>
        </div>
        <div class="topbar-actions">
          <a href="/" class="btn secondary">홈으로 돌아가기</a>
          <button class="btn secondary" id="logout-btn">로그아웃</button>
        </div>
      </div>

      <div class="toolbar">
        <div class="tabs">
          <div class="tab active" data-tab="news">교회소식</div>
          <div class="tab" data-tab="notices">공지사항</div>
        </div>
        <div class="toolbar-right">
          <button type="button" class="quick-add" id="quick-add">+ 새 항목 추가하기</button>
          <div class="view-toggle">
            <button type="button" data-view="grid">⊞ 그리드</button>
            <button type="button" data-view="list" class="active">☰ 나열</button>
          </div>
        </div>
      </div>

      <div class="panel active" id="panel-news">
        <div id="news-list" class="list-grid"></div>
      </div>

      <div class="panel" id="panel-notices">
        <div id="notices-list" class="list-grid"></div>
      </div>
    </div>
  </div>

  <script>
    const loginView = document.getElementById('login-view');
    const appView = document.getElementById('app-view');

    async function checkSession() {
      try {
        const res = await fetch('/api/admin/session');
        const data = await res.json();
        return !!data.authenticated;
      } catch { return false; }
    }

    async function showApp() {
      loginView.style.display = 'none';
      appView.style.display = 'block';
      await Promise.all([loadNews(), loadNotices()]);
    }

    function showLogin() {
      loginView.style.display = 'flex';
      appView.style.display = 'none';
    }

    // 저장 안 한 사진이 있는 채로 새로고침/닫기 하면 그 항목 전체가 사라지므로 경고
    window.addEventListener('beforeunload', e => {
      const hasPending = [...newsItems, ...noticeItems].some(item => item._pending && item._pending.length);
      if (hasPending) { e.preventDefault(); e.returnValue = ''; }
    });

    (async () => {
      if (await checkSession()) showApp(); else showLogin();
    })();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;
      const errEl = document.getElementById('login-error');
      errEl.style.display = 'none';
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '로그인 실패');
        showApp();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
      }
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/api/admin/logout', { method: 'POST' });
      showLogin();
    });

    // Tabs
    const quickAddBtn = document.getElementById('quick-add');
    const QUICK_ADD_LABELS = { news: '+ 새 교회소식 추가', notices: '+ 새 공지 추가' };
    function updateQuickAddLabel() {
      const activeTab = document.querySelector('.tab.active').dataset.tab;
      quickAddBtn.textContent = QUICK_ADD_LABELS[activeTab];
    }
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active');
        updateQuickAddLabel();
      });
    });
    updateQuickAddLabel();

    let toastTimer = null;
    function showToast(msg, type, duration) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast' + (type === 'err' ? ' err' : '');
      toast.hidden = false;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.hidden = true; }, duration || 2600);
    }

    // 날짜 칸 어디를 눌러도 달력이 뜨도록 (우측 달력 아이콘만이 아니라)
    document.addEventListener('click', e => {
      const el = e.target;
      if (el instanceof HTMLInputElement && el.type === 'date' && typeof el.showPicker === 'function') {
        try { el.showPicker(); } catch (_) {}
      }
    });

    function expandFirstCard(listId) {
      const firstCard = document.querySelector(`#${listId} .card`);
      if (firstCard) firstCard.classList.add('expanded');
    }

    document.getElementById('quick-add').addEventListener('click', () => {
      const activeTab = document.querySelector('.tab.active').dataset.tab;
      if (activeTab === 'news') {
        newsItems.unshift({ title: '', date: todayStr(), tag: '소식', image: '', body: '' });
        renderNews();
        expandFirstCard('news-list');
      } else {
        noticeItems.unshift({ title: '', date: todayStr(), image: '', body: '' });
        renderNotices();
        expandFirstCard('notices-list');
      }
    });

    // View toggle (그리드 / 나열)
    document.querySelectorAll('.view-toggle button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        appView.classList.toggle('view-list', btn.dataset.view === 'list');
      });
    });

    const bust = () => `?t=${Date.now()}`;
    const todayStr = () => new Date().toISOString().slice(0, 10);
    const fmtDateKo = iso => {
      const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(iso || '');
      return m ? `${m[1]}. ${m[2]}. ${m[3]}` : (iso || '');
    };
    const TAG_PRESETS = ['공지', '행사', '선교', '교육', '소식'];

    const MAX_IMAGES = 10;

    // 이전 데이터(단일 image) 및 신규 데이터(images 배열) 모두 지원
    function getImages(item) {
      if (Array.isArray(item.images) && item.images.length) return item.images.filter(Boolean);
      return item.image ? [item.image] : [];
    }

    // 세로 사진 등 잘리는 사진의 노출 위치(object-position) — 이미지 경로별로 저장
    function getImagePos(item, src) {
      return (item.imagePos && item.imagePos[src]) || '50% 50%';
    }
    function setImagePos(item, src, pos) {
      item.imagePos = item.imagePos || {};
      item.imagePos[src] = pos;
    }

    // 사진 위치 조정 팝업 — 첨부한 사진 썸네일을 클릭하면 뜨는 단일 팝업.
    // 실제 사이트에서 사진이 노출되는 비율(16:10)로 보여주고, 드래그로 위치를 바로 조정한다.
    const posModal = document.getElementById('pos-modal');
    const posModalImg = document.getElementById('pos-modal-img');
    let posItem = null, posSrc = null;
    let posDragging = false, posRect = null, posStartX = 0, posStartY = 0, posStartVal = { x: 50, y: 50 };

    function openPosModal(item, src) {
      posItem = item;
      posSrc = src;
      posModalImg.src = src;
      posModalImg.style.objectPosition = getImagePos(item, src);
      posModal.classList.add('open');
    }
    function closePosModal() { posModal.classList.remove('open'); }

    document.getElementById('pos-modal-close').addEventListener('click', closePosModal);
    posModal.querySelectorAll('[data-pos-close]').forEach(el => el.addEventListener('click', closePosModal));
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && posModal.classList.contains('open')) closePosModal(); });

    posModalImg.addEventListener('pointerdown', e => {
      if (!posItem) return;
      posDragging = true;
      posRect = posModalImg.getBoundingClientRect();
      const [px, py] = getImagePos(posItem, posSrc).split(' ').map(v => parseFloat(v));
      posStartVal = { x: px, y: py };
      posStartX = e.clientX;
      posStartY = e.clientY;
      posModalImg.classList.add('dragging-pos');
      try { posModalImg.setPointerCapture(e.pointerId); } catch (_) {}
      e.preventDefault();
    });
    posModalImg.addEventListener('pointermove', e => {
      if (!posDragging) return;
      const dx = e.clientX - posStartX;
      const dy = e.clientY - posStartY;
      const xPct = Math.max(0, Math.min(100, posStartVal.x - (dx / posRect.width) * 100));
      const yPct = Math.max(0, Math.min(100, posStartVal.y - (dy / posRect.height) * 100));
      const val = `${Math.round(xPct)}% ${Math.round(yPct)}%`;
      setImagePos(posItem, posSrc, val);
      posModalImg.style.objectPosition = val;
    });
    const endPosDrag = () => { posDragging = false; posModalImg.classList.remove('dragging-pos'); };
    posModalImg.addEventListener('pointerup', endPosDrag);
    posModalImg.addEventListener('pointercancel', endPosDrag);
    posModalImg.addEventListener('dblclick', () => {
      setImagePos(posItem, posSrc, '50% 50%');
      posModalImg.style.objectPosition = '50% 50%';
    });

    function toJpgName(name) {
      return (name || 'image').replace(/\.[^.]+$/, '') + '.jpg';
    }

    // 업로드 전 이미지 리사이즈·압축 (긴 변 1600px, JPEG) —
    // 폰 사진 용량이 커서 업로드가 실패하며 빨간 오류가 뜨던 문제를 방지하고 사이트도 빨라짐.
    function compressImage(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
          URL.revokeObjectURL(url);
          const MAXDIM = 1600;
          let { width, height } = img;
          if (Math.max(width, height) > MAXDIM) {
            const s = MAXDIM / Math.max(width, height);
            width = Math.round(width * s);
            height = Math.round(height * s);
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
          resolve({ dataUrl, base64: dataUrl.split(',')[1] });
        };
        img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('이미지를 불러오지 못했습니다.')); };
        img.src = url;
      });
    }

    // 카드별 다중 이미지 첨부 UI (최대 10장) — 교회소식·공지사항 공용
    function attachImageUploader(card, item) {
      const fileInput = card.querySelector('[data-field="imageFile"]');
      const thumbsWrap = card.querySelector('[data-thumbs]');
      const hintEl = card.querySelector('[data-img-hint]');
      if (!Array.isArray(item.images)) item.images = item.image ? [item.image] : [];
      item._pending = item._pending || [];

      const total = () => item.images.length + item._pending.length;

      function makeThumb(src, onDel, processing, onClickPos) {
        const wrap = document.createElement('div');
        wrap.className = 'thumb-wrap' + (processing ? ' processing' : '');
        const img = document.createElement('img');
        img.className = 'thumb';
        img.src = src;
        if (onClickPos) {
          img.style.cursor = 'pointer';
          img.title = '클릭해서 사진 위치 조정';
          img.addEventListener('click', onClickPos);
        }
        const del = document.createElement('button');
        del.type = 'button';
        del.className = 'thumb-del';
        del.title = '사진 삭제';
        del.textContent = '×';
        del.addEventListener('click', onDel);
        wrap.append(img, del);
        return wrap;
      }

      function render() {
        thumbsWrap.innerHTML = '';
        item.images.forEach((src, idx) => {
          thumbsWrap.appendChild(makeThumb(src, () => { item.images.splice(idx, 1); render(); }, false, () => openPosModal(item, src)));
        });
        item._pending.forEach((p, idx) => {
          const onClickPos = p.processing ? null : () => openPosModal(item, p.dataUrl);
          thumbsWrap.appendChild(makeThumb(p.dataUrl, () => { item._pending.splice(idx, 1); render(); }, p.processing, onClickPos));
        });
        const n = total();
        hintEl.textContent = n ? `${n} / ${MAX_IMAGES}장` : '';
        fileInput.disabled = n >= MAX_IMAGES;
      }

      // 선택 즉시 원본 미리보기(objectURL)를 먼저 보여주고, 압축은 뒤에서 진행 —
      // 큰 사진 압축을 기다리는 동안 화면이 빈 채로 있는 것처럼 보이던 문제 방지.
      fileInput.addEventListener('change', () => {
        const files = Array.from(fileInput.files || []);
        fileInput.value = '';
        for (const file of files) {
          if (total() >= MAX_IMAGES) {
            showToast(`이미지는 최대 ${MAX_IMAGES}장까지 첨부할 수 있어요.`, 'err');
            break;
          }
          const entry = { id: `p${Date.now()}_${Math.random().toString(36).slice(2)}`, dataUrl: URL.createObjectURL(file), base64: null, name: toJpgName(file.name), processing: true };
          entry.ready = compressImage(file).then(({ dataUrl, base64 }) => {
            URL.revokeObjectURL(entry.dataUrl);
            entry.dataUrl = dataUrl;
            entry.base64 = base64;
            entry.processing = false;
            render();
          }).catch(err => {
            const idx = item._pending.indexOf(entry);
            if (idx !== -1) item._pending.splice(idx, 1);
            render();
            showToast(err.message || '이미지 처리 실패', 'err');
          });
          item._pending.push(entry);
        }
        render();
      });

      render();
    }

    // 아직 업로드 안 된(_pending) 사진은 실제 경로 대신 "__pending:id" 자리표시자로 payload에 넣고,
    // 실제 파일 데이터는 files 배열에 따로 모은다. 서버가 사진+JSON을 한 커밋으로 한 번에 반영하고,
    // 실제 경로로 치환해 돌려준다 — 사진마다 따로 커밋하다가 중간에 실패해 사진만 고아로 남고
    // 정작 글은 저장 안 되던 문제를 막기 위함.
    function buildSaveItem(item, allFiles) {
      const images = [];
      const imagePos = {};
      (item.images || []).filter(Boolean).forEach(src => {
        images.push(src);
        if (item.imagePos && item.imagePos[src]) imagePos[src] = item.imagePos[src];
      });
      (item._pending || []).forEach(p => {
        if (!p.base64) return;
        const placeholder = `__pending:${p.id}`;
        images.push(placeholder);
        allFiles.push({ id: p.id, filename: p.name, dataBase64: p.base64 });
        if (item.imagePos && item.imagePos[p.dataUrl]) imagePos[placeholder] = item.imagePos[p.dataUrl];
      });
      return { images, imagePos };
    }

    // 저장 성공 후: pending으로 남아있던 사진을 서버가 알려준 실제 경로로 로컬 상태에도 반영
    function applySavedPaths(items, pathMap) {
      if (!pathMap) return;
      items.forEach(item => {
        if (!item._pending || !item._pending.length) return;
        if (!Array.isArray(item.images)) item.images = item.image ? [item.image] : [];
        item._pending.forEach(p => {
          const finalPath = pathMap[p.id];
          if (!finalPath) return;
          item.images.push(finalPath);
          if (item.imagePos && item.imagePos[p.dataUrl] != null) {
            item.imagePos[finalPath] = item.imagePos[p.dataUrl];
            delete item.imagePos[p.dataUrl];
          }
        });
        item._pending = [];
      });
    }

    // ---- 교회소식 ----
    let newsItems = [];
    async function loadNews() {
      const res = await fetch('/data/news.json' + bust(), { cache: 'no-store' });
      const data = await res.json().catch(() => ({ items: [] }));
      newsItems = (data.items || []).slice();
      renderNews();
    }

    // ---- 드래그 정렬 ----
    let dragSrcIndex = null;
    function attachDragReorder(card, index, items, rerender) {
      const handle = card.querySelector('.drag-handle');
      handle.addEventListener('mousedown', () => { card.draggable = true; });
      card.addEventListener('dragend', () => {
        card.draggable = false;
        card.classList.remove('dragging');
        document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      });
      card.addEventListener('dragstart', (e) => {
        dragSrcIndex = index;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(index));
      });
      card.addEventListener('dragover', (e) => {
        e.preventDefault();
        card.classList.add('drag-over');
      });
      card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
      card.addEventListener('drop', (e) => {
        e.preventDefault();
        card.classList.remove('drag-over');
        if (dragSrcIndex === null || dragSrcIndex === index) return;
        const [moved] = items.splice(dragSrcIndex, 1);
        items.splice(index, 0, moved);
        dragSrcIndex = null;
        rerender();
      });
    }

    // ---- 미리보기 (팝업, 실제 홈 화면에 노출되는 형태 그대로) ----
    const PREVIEW_CSS_LINKS = `
      <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
      <link rel="stylesheet" href="/css/style.css">
    `;
    // 실제 사이트와 동일한 상세 팝업 + 사진 확대 마크업 (교회소식·공지사항 공용, 처음엔 닫힌 상태)
    const NEWS_MODAL_MARKUP = `
      <div class="news-modal" id="news-modal">
        <div class="news-modal-backdrop"></div>
        <div class="news-modal-inner">
          <button class="news-modal-close" id="news-modal-close" aria-label="닫기">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          <div class="news-modal-media" id="news-modal-media"></div>
          <div class="news-modal-body">
            <div class="news-modal-meta">
              <span class="news-modal-tag" id="news-modal-tag"></span>
              <span class="news-modal-date" id="news-modal-date"></span>
            </div>
            <h3 class="news-modal-title" id="news-modal-title"></h3>
            <p class="news-modal-text" id="news-modal-text"></p>
          </div>
        </div>
      </div>
      <div class="img-zoom" id="img-zoom">
        <button class="img-zoom-close" id="img-zoom-close" aria-label="닫기">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <img class="img-zoom-img" id="img-zoom-img" src="" alt="" draggable="false" />
      </div>
    `;
    // 저장 전(업로드 중) 이미지도 즉시 미리 보여주기 위해 로컬 미리보기(_pending)까지 포함
    function previewImages(item) {
      return getImages(item).concat((item._pending || []).map(p => p.dataUrl));
    }

    // 실제 홈 화면 카드와 완전히 동일한 마크업(이미지+제목만, 태그·날짜는 카드에 안 보임) +
    // 3개씩 보이는 가로 스크롤(네비게이션 화살표 포함)까지 그대로 재현
    function buildNewsPreviewSrcdoc(items) {
      const cardsHtml = items.map((it, i) => {
        const imgs = previewImages(it);
        const src = imgs[0] || '';
        const img = src ? `<img src="${escapeAttr(src)}" alt="" style="object-position:${escapeAttr(getImagePos(it, src))};" />` : '';
        const play = it.video ? `<span class="news-play"><svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M8 5v14l11-7z"/></svg></span>` : '';
        const count = imgs.length > 1 ? `<span class="news-img-count">${imgs.length}</span>` : '';
        const media = src ? `<div class="news-img">${img}${play}${count}</div>` : '';
        return `<article class="news-card" data-idx="${i}" tabindex="0" role="button" aria-haspopup="dialog">
          ${media}
          <div class="news-body"><h3 class="news-title">${escapeHtml(it.title || '제목을 입력해주세요')}</h3></div>
        </article>`;
      }).join('');

      return `<!DOCTYPE html><html><head><meta charset="utf-8">${PREVIEW_CSS_LINKS}
        <style>body{margin:0;}</style>
        </head><body>
        <section class="news">
          <div class="wrap">
            <div class="news-head-row">
              <div><p class="label">교회소식</p><h2 class="news-heading">최신 소식</h2></div>
              <div class="news-nav" id="news-nav" hidden>
                <button type="button" class="news-nav-btn" id="news-prev" aria-label="이전 소식">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <button type="button" class="news-nav-btn" id="news-next" aria-label="다음 소식">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M9 18l6-6-6-6"/></svg>
                </button>
              </div>
            </div>
            <div class="news-viewport"><div class="news-grid">${cardsHtml}</div></div>
          </div>
        </section>
        ${NEWS_MODAL_MARKUP}
        </body></html>`;
    }

    // 실제 공지 패널과 동일한 마크업. 실제 사이트처럼 최대 8개까지만 노출되고,
    // 사진·내용이 있는 항목만 클릭 가능하다.
    function buildNoticePreviewSrcdoc(items) {
      const shown = items.slice(0, 8);
      const listHtml = shown.map((it, i) => {
        const imgs = previewImages(it);
        const hasExtra = !!(imgs.length || it.body || it.video);
        const inner = `<span class="notice-item-date">${escapeHtml(fmtDateKo(it.date))}</span><p class="notice-item-title">${escapeHtml(it.title || '제목을 입력해주세요')}</p>`;
        if (!hasExtra) return `<li class="notice-item">${inner}</li>`;
        return `<li class="notice-item notice-item--clickable" data-idx="${i}" tabindex="0" role="button" aria-haspopup="dialog">${inner}</li>`;
      }).join('');

      return `<!DOCTYPE html><html><head><meta charset="utf-8">${PREVIEW_CSS_LINKS}
        <style>
          body{margin:0;background:#f3f7f5;}
          .preview-page{padding:32px;display:flex;justify-content:center;}
          .notice-panel{position:static;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,0.12);}
        </style>
        </head><body>
        <div class="preview-page">
          <div class="notice-panel open">
            <div class="notice-panel-head"><h3>공지사항</h3></div>
            <ul class="notice-list">${listHtml}</ul>
          </div>
        </div>
        ${NEWS_MODAL_MARKUP}
        </body></html>`;
    }

    const previewModal = document.getElementById('preview-modal');
    const previewFrame = document.getElementById('preview-modal-frame');
    const closePreviewModal = () => previewModal.classList.remove('open');
    document.getElementById('preview-modal-close').addEventListener('click', closePreviewModal);
    previewModal.querySelectorAll('[data-preview-close]').forEach(el => el.addEventListener('click', closePreviewModal));
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && previewModal.classList.contains('open')) closePreviewModal(); });

    // 실제 사이트와 동일한 사진 확대(클릭/휠 확대, 드래그 이동) — 위치 조정과는 별개로, 보기용.
    function createZoomController(doc) {
      const overlay = doc.getElementById('img-zoom');
      if (!overlay) return { open() {} };
      const img = doc.getElementById('img-zoom-img');
      const closeBtn = doc.getElementById('img-zoom-close');
      let scale = 1, tx = 0, ty = 0, dragging = false, moved = false, sx = 0, sy = 0;

      const apply = () => { img.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`; };
      const setScale = s => {
        scale = Math.min(5, Math.max(1, s));
        if (scale === 1) { tx = 0; ty = 0; }
        img.classList.toggle('zoomed', scale > 1);
        apply();
      };
      const open = src => {
        img.src = src;
        scale = 1; tx = 0; ty = 0; img.classList.remove('zoomed'); apply();
        overlay.classList.add('open');
      };
      const close = () => overlay.classList.remove('open');

      img.addEventListener('click', e => {
        e.stopPropagation();
        if (moved) { moved = false; return; }
        setScale(scale > 1 ? 1 : 2.5);
      });
      img.addEventListener('wheel', e => {
        e.preventDefault();
        setScale(scale + (e.deltaY < 0 ? 0.3 : -0.3));
      }, { passive: false });
      img.addEventListener('pointerdown', e => {
        if (scale <= 1) return;
        dragging = true; moved = false;
        sx = e.clientX - tx; sy = e.clientY - ty;
        img.setPointerCapture(e.pointerId);
      });
      img.addEventListener('pointermove', e => {
        if (!dragging) return;
        tx = e.clientX - sx; ty = e.clientY - sy; moved = true; apply();
      });
      img.addEventListener('pointerup', () => { dragging = false; });
      overlay.addEventListener('click', close);
      closeBtn.addEventListener('click', e => { e.stopPropagation(); close(); });
      doc.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });

      return { open };
    }

    // 실제 사이트와 동일한 상세 팝업을 iframe 안에서 그대로 열고 닫는다 (보기 전용, 위치 조정은 여기서 하지 않음).
    function createPreviewModalController(doc) {
      const modal = doc.getElementById('news-modal');
      const media = doc.getElementById('news-modal-media');
      const tagEl = doc.getElementById('news-modal-tag');
      const dateEl = doc.getElementById('news-modal-date');
      const titleEl = doc.getElementById('news-modal-title');
      const textEl = doc.getElementById('news-modal-text');
      const closeBtn = doc.getElementById('news-modal-close');
      const backdrop = modal.querySelector('.news-modal-backdrop');
      const zoom = createZoomController(doc);

      function renderGallery(item) {
        media.innerHTML = '';
        const imgs = previewImages(item);
        media.hidden = !imgs.length;
        if (!imgs.length) return;

        const gallery = doc.createElement('div');
        gallery.className = 'news-gallery';
        let idx = 0;
        const img = doc.createElement('img');
        img.alt = '';
        img.src = imgs[0];
        img.style.objectPosition = getImagePos(item, imgs[0]);
        img.addEventListener('click', () => zoom.open(imgs[idx]));
        gallery.appendChild(img);

        if (imgs.length > 1) {
          const prev = doc.createElement('button');
          prev.type = 'button'; prev.className = 'gal-nav gal-prev'; prev.setAttribute('aria-label', '이전 사진'); prev.textContent = '‹';
          const next = doc.createElement('button');
          next.type = 'button'; next.className = 'gal-nav gal-next'; next.setAttribute('aria-label', '다음 사진'); next.textContent = '›';
          const dots = doc.createElement('div');
          dots.className = 'gal-dots';
          const dotEls = imgs.map((_, i) => {
            const d = doc.createElement('span');
            if (i === 0) d.className = 'on';
            dots.appendChild(d);
            return d;
          });
          const show = n => {
            idx = (n + imgs.length) % imgs.length;
            img.src = imgs[idx];
            img.style.objectPosition = getImagePos(item, imgs[idx]);
            dotEls.forEach((d, i) => { d.className = i === idx ? 'on' : ''; });
          };
          prev.addEventListener('click', e => { e.stopPropagation(); show(idx - 1); });
          next.addEventListener('click', e => { e.stopPropagation(); show(idx + 1); });
          gallery.append(prev, next, dots);
        }
        media.appendChild(gallery);
      }

      function open(item) {
        renderGallery(item);
        tagEl.textContent = item.tag || '';
        dateEl.textContent = fmtDateKo(item.date);
        titleEl.textContent = item.title || '';
        textEl.textContent = item.body || '';
        textEl.hidden = !item.body;
        modal.classList.add('open');
      }
      function close() { modal.classList.remove('open'); }

      closeBtn.addEventListener('click', close);
      backdrop.addEventListener('click', close);
      doc.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });

      return { open, close };
    }

    // 실제 사이트의 "3개씩 보이는 가로 스크롤 + 화살표" 캐러셀 동작을 그대로 재현
    function wireNewsCarousel(doc) {
      const grid = doc.querySelector('.news-grid');
      const viewport = grid && grid.closest('.news-viewport');
      const nav = doc.getElementById('news-nav');
      const prevBtn = doc.getElementById('news-prev');
      const nextBtn = doc.getElementById('news-next');
      if (!viewport || !nav || !prevBtn || !nextBtn) return;
      let autoTimer = null;
      const AUTO_DELAY = 4500;

      const atEnd = () => viewport.scrollLeft >= viewport.scrollWidth - viewport.clientWidth - 4;
      const advance = () => {
        if (atEnd()) viewport.scrollTo({ left: 0, behavior: 'smooth' });
        else viewport.scrollBy({ left: viewport.clientWidth, behavior: 'smooth' });
      };
      const stopAuto = () => { if (autoTimer) { clearInterval(autoTimer); autoTimer = null; } };
      const startAuto = () => {
        stopAuto();
        if (viewport.scrollWidth <= viewport.clientWidth + 4) return;
        autoTimer = setInterval(advance, AUTO_DELAY);
      };
      const updateNav = () => {
        const scrollable = viewport.scrollWidth > viewport.clientWidth + 4;
        nav.hidden = !scrollable;
        if (!scrollable) { stopAuto(); return; }
        prevBtn.disabled = viewport.scrollLeft <= 4;
        nextBtn.disabled = false;
        startAuto();
      };

      prevBtn.addEventListener('click', () => { viewport.scrollBy({ left: -viewport.clientWidth, behavior: 'smooth' }); startAuto(); });
      nextBtn.addEventListener('click', () => { advance(); startAuto(); });
      viewport.addEventListener('mouseenter', stopAuto);
      viewport.addEventListener('mouseleave', startAuto);
      viewport.addEventListener('scroll', () => { prevBtn.disabled = viewport.scrollLeft <= 4; }, { passive: true });
      doc.defaultView.addEventListener('resize', updateNav);
      updateNav();
    }

    function wireNewsPreview(doc, items) {
      const controller = createPreviewModalController(doc);
      doc.querySelectorAll('.news-card[data-idx]').forEach(card => {
        const item = items[Number(card.dataset.idx)];
        card.addEventListener('click', () => controller.open(item));
        card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); controller.open(item); } });
      });
      wireNewsCarousel(doc);
    }

    function wireNoticePreview(doc, items) {
      const shown = items.slice(0, 8);
      const controller = createPreviewModalController(doc);
      doc.querySelectorAll('.notice-item--clickable[data-idx]').forEach(li => {
        const item = shown[Number(li.dataset.idx)];
        li.addEventListener('click', () => controller.open(item));
        li.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); controller.open(item); } });
      });
    }

    function attachPreview(card, getItems, buildSrcdoc, wireFn) {
      const btn = card.querySelector('[data-preview]');
      btn.addEventListener('click', () => {
        const items = getItems();
        previewFrame.onload = () => {
          try { wireFn(previewFrame.contentDocument, items); } catch (_) {}
        };
        previewFrame.srcdoc = buildSrcdoc(items);
        previewModal.classList.add('open');
      });
    }

    function makeAddCard(label, onAdd) {
      const addCard = document.createElement('button');
      addCard.type = 'button';
      addCard.className = 'add-card';
      addCard.innerHTML = `<span class="plus">+</span><span>${label}</span>`;
      addCard.addEventListener('click', onAdd);
      return addCard;
    }

    function renderNews() {
      const list = document.getElementById('news-list');
      list.innerHTML = '';

      newsItems.forEach((item, i) => {
        const isCustomTag = !!item.tag && !TAG_PRESETS.includes(item.tag);
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-summary" data-toggle>
            <span class="card-summary-title">${escapeHtml(item.title || '제목을 입력해주세요')}</span>
            <span class="card-summary-meta"><span>${escapeHtml(item.date || '')}</span><span class="card-summary-chevron">⌄</span></span>
          </div>
          <div class="card-fields">
            <div class="card-head">
              <div class="card-head-left">
                <span class="drag-handle" title="드래그하여 순서 변경">⠿⠿</span>
                <span>#${i + 1}</span>
              </div>
              <div class="card-head-actions">
                <button class="btn preview-btn" data-preview>미리보기</button>
                <button class="btn" data-save>저장</button>
                <button class="btn danger" data-i="${i}">삭제</button>
              </div>
            </div>
            <div class="field"><label>제목</label><input type="text" data-field="title" value="${escapeAttr(item.title || '')}" /></div>
            <div class="row2">
              <div class="field"><label>날짜</label><input type="date" data-field="date" value="${escapeAttr(item.date || '')}" /></div>
              <div class="field">
                <label>분류</label>
                <select data-field="tag">
                  ${TAG_PRESETS.map(t => `<option value="${t}" ${item.tag === t ? 'selected' : ''}>${t}</option>`).join('')}
                  <option value="__custom__" ${isCustomTag ? 'selected' : ''}>기타</option>
                </select>
                <input type="text" class="tag-custom" data-field="tagCustom" placeholder="분류 직접 입력"
                  value="${isCustomTag ? escapeAttr(item.tag) : ''}"
                  style="${isCustomTag ? 'display:block;' : 'display:none;'}" />
              </div>
            </div>
            <div class="field">
              <label>사진 (최대 10장, 선택)</label>
              <input type="file" accept="image/*" multiple data-field="imageFile" />
              <div class="thumbs" data-thumbs></div>
              <p class="img-hint" data-img-hint></p>
            </div>
            <div class="field"><label>내용 (선택)</label><textarea data-field="body">${escapeHtml(item.body || '')}</textarea></div>
            <div class="card-footer">
              <span class="save-status"></span>
            </div>
          </div>
        `;
        const summaryTitle = card.querySelector('.card-summary-title');
        const summaryDate = card.querySelector('.card-summary-meta span');
        card.querySelector('[data-toggle]').addEventListener('click', () => card.classList.toggle('expanded'));
        card.querySelector('[data-i]').addEventListener('click', async () => {
          if (!confirm('삭제하시겠습니까?')) return;
          newsItems.splice(i, 1);
          renderNews();
          try {
            await persistNews();
            showToast('삭제되었습니다.');
          } catch (err) {
            showToast('삭제 저장 중 오류: ' + err.message, 'err');
          }
        });
        card.querySelector('[data-field="title"]').addEventListener('input', e => { item.title = e.target.value; summaryTitle.textContent = item.title || '제목을 입력해주세요'; });
        card.querySelector('[data-field="date"]').addEventListener('input', e => { item.date = e.target.value; summaryDate.textContent = item.date; });
        card.querySelector('[data-field="body"]').addEventListener('input', e => item.body = e.target.value);

        const tagSelect = card.querySelector('[data-field="tag"]');
        const tagCustom = card.querySelector('[data-field="tagCustom"]');
        tagSelect.addEventListener('change', e => {
          if (e.target.value === '__custom__') {
            tagCustom.style.display = 'block';
            tagCustom.focus();
            item.tag = tagCustom.value || '';
          } else {
            tagCustom.style.display = 'none';
            item.tag = e.target.value;
          }
        });
        tagCustom.addEventListener('input', e => { item.tag = e.target.value; });

        attachImageUploader(card, item);

        const statusEl = card.querySelector('.save-status');
        card.querySelector('[data-save]').addEventListener('click', () => saveNews(statusEl));

        attachDragReorder(card, i, newsItems, renderNews);
        attachPreview(card, () => newsItems, buildNewsPreviewSrcdoc, wireNewsPreview);

        list.appendChild(card);
      });

      list.appendChild(makeAddCard('새 소식 추가', () => {
        newsItems.unshift({ title: '', date: todayStr(), tag: '소식', image: '', body: '' });
        renderNews();
        expandFirstCard('news-list');
      }));
    }

    async function persistNews() {
      for (const item of newsItems) {
        if (item._pending && item._pending.length) await Promise.all(item._pending.map(p => p.ready || Promise.resolve()));
      }
      const allFiles = [];
      const clean = newsItems.map(item => {
        const { images, imagePos } = buildSaveItem(item, allFiles);
        return { title: item.title || '', date: item.date || '', tag: item.tag || '', image: images[0] || '', images, imagePos, body: item.body || '' };
      });
      const res = await fetch('/api/admin/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ collection: 'news', items: clean, files: allFiles })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '저장 실패');
      applySavedPaths(newsItems, data.pathMap);
    }

    async function saveNews(statusEl) {
      statusEl.textContent = '저장 중...'; statusEl.className = 'save-status';
      try {
        await persistNews();
        statusEl.textContent = ''; statusEl.className = 'save-status';
        showToast('저장이 완료되었습니다. 사이트 반영까지 1~2분 정도 걸릴 수 있어요.', null, 3800);
      } catch (err) {
        statusEl.textContent = ''; statusEl.className = 'save-status';
        showToast(err.message, 'err');
      }
    }

    // ---- 공지사항 ----
    let noticeItems = [];
    async function loadNotices() {
      const res = await fetch('/data/notices.json' + bust(), { cache: 'no-store' });
      const data = await res.json().catch(() => ({ items: [] }));
      noticeItems = (data.items || []).slice();
      renderNotices();
    }

    function renderNotices() {
      const list = document.getElementById('notices-list');
      list.innerHTML = '';

      noticeItems.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-summary" data-toggle>
            <span class="card-summary-title">${escapeHtml(item.title || '제목을 입력해주세요')}</span>
            <span class="card-summary-meta"><span>${escapeHtml(item.date || '')}</span><span class="card-summary-chevron">⌄</span></span>
          </div>
          <div class="card-fields">
            <div class="card-head">
              <div class="card-head-left">
                <span class="drag-handle" title="드래그하여 순서 변경">⠿⠿</span>
                <span>#${i + 1}</span>
              </div>
              <div class="card-head-actions">
                <button class="btn preview-btn" data-preview>미리보기</button>
                <button class="btn" data-save>저장</button>
                <button class="btn danger" data-i="${i}">삭제</button>
              </div>
            </div>
            <div class="field"><label>제목</label><input type="text" data-field="title" value="${escapeAttr(item.title || '')}" /></div>
            <div class="field"><label>날짜</label><input type="date" data-field="date" value="${escapeAttr(item.date || '')}" /></div>
            <div class="field">
              <label>사진 (최대 10장, 선택)</label>
              <input type="file" accept="image/*" multiple data-field="imageFile" />
              <div class="thumbs" data-thumbs></div>
              <p class="img-hint" data-img-hint></p>
            </div>
            <div class="field"><label>내용 (선택)</label><textarea data-field="body">${escapeHtml(item.body || '')}</textarea></div>
            <div class="card-footer">
              <span class="save-status"></span>
            </div>
          </div>
        `;
        const summaryTitle = card.querySelector('.card-summary-title');
        const summaryDate = card.querySelector('.card-summary-meta span');
        card.querySelector('[data-toggle]').addEventListener('click', () => card.classList.toggle('expanded'));
        card.querySelector('[data-i]').addEventListener('click', async () => {
          if (!confirm('삭제하시겠습니까?')) return;
          noticeItems.splice(i, 1);
          renderNotices();
          try {
            await persistNotices();
            showToast('삭제되었습니다.');
          } catch (err) {
            showToast('삭제 저장 중 오류: ' + err.message, 'err');
          }
        });
        card.querySelector('[data-field="title"]').addEventListener('input', e => { item.title = e.target.value; summaryTitle.textContent = item.title || '제목을 입력해주세요'; });
        card.querySelector('[data-field="date"]').addEventListener('input', e => { item.date = e.target.value; summaryDate.textContent = item.date; });
        card.querySelector('[data-field="body"]').addEventListener('input', e => item.body = e.target.value);

        attachImageUploader(card, item);

        const statusEl = card.querySelector('.save-status');
        card.querySelector('[data-save]').addEventListener('click', () => saveNotices(statusEl));

        attachDragReorder(card, i, noticeItems, renderNotices);
        attachPreview(card, () => noticeItems, buildNoticePreviewSrcdoc, wireNoticePreview);

        list.appendChild(card);
      });

      list.appendChild(makeAddCard('새 공지 추가', () => {
        noticeItems.unshift({ title: '', date: todayStr(), image: '', body: '' });
        renderNotices();
        expandFirstCard('notices-list');
      }));
    }

    async function persistNotices() {
      for (const item of noticeItems) {
        if (item._pending && item._pending.length) await Promise.all(item._pending.map(p => p.ready || Promise.resolve()));
      }
      const allFiles = [];
      const clean = noticeItems.map(item => {
        const { images, imagePos } = buildSaveItem(item, allFiles);
        return { title: item.title || '', date: item.date || '', image: images[0] || '', images, imagePos, body: item.body || '' };
      });
      const res = await fetch('/api/admin/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ collection: 'notices', items: clean, files: allFiles })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '저장 실패');
      applySavedPaths(noticeItems, data.pathMap);
    }

    async function saveNotices(statusEl) {
      statusEl.textContent = '저장 중...'; statusEl.className = 'save-status';
      try {
        await persistNotices();
        statusEl.textContent = ''; statusEl.className = 'save-status';
        showToast('저장이 완료되었습니다. 사이트 반영까지 1~2분 정도 걸릴 수 있어요.', null, 3800);
      } catch (err) {
        statusEl.textContent = ''; statusEl.className = 'save-status';
        showToast(err.message, 'err');
      }
    }

    // ---- helpers ----
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }
    function escapeAttr(s) { return escapeHtml(s); }
    function readAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    async function readAsBase64(file) {
      const dataUrl = await readAsDataURL(file);
      return dataUrl.split(',')[1];
    }
  </script>
