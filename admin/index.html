<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>정다운교회 관리자</title>
  <link rel="icon" href="/img/logo.jpg" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    :root {
      --accent: #3d7a56;
      --accent-dim: rgba(61, 122, 86, 0.10);
      --ink: #17201b;
      --muted: #6b7a70;
      --line: #e3e8e4;
      --surf: #f3f7f5;
      --r: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--surf);
      color: var(--ink);
      font-size: 16px;
    }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 56px 48px 100px; }
    h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 6px; }
    .sub { color: var(--muted); font-size: 1rem; margin: 0; }

    /* Login */
    #login-view { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card {
      width: 100%; max-width: 400px;
      background: #fff; border-radius: 20px; padding: 52px 44px;
      box-shadow: 0 12px 44px rgba(0,0,0,0.10);
    }
    .login-card h1 { text-align: center; margin-bottom: 32px; font-size: 1.5rem; }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 0.92rem; font-weight: 700; margin-bottom: 8px; color: var(--muted); }
    .field input, .field textarea, .field select {
      width: 100%; height: 48px; padding: 0 16px; border: 1.5px solid var(--line); border-radius: 10px;
      font-family: inherit; font-size: 1rem; background: #fff; color: var(--ink);
      transition: border-color 0.15s;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      outline: none; border-color: var(--accent);
    }
    .field textarea { height: auto; padding: 12px 16px; resize: vertical; min-height: 90px; line-height: 1.6; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      height: 52px; padding: 0 28px; border-radius: 10px; border: none;
      background: var(--accent); color: #fff; font-weight: 700; font-size: 1.02rem;
      cursor: pointer; width: 100%;
      transition: background 0.15s, transform 0.15s;
    }
    .btn:hover { background: #2e6040; }
    .btn:active { transform: scale(0.98); }
    .btn.secondary { background: #fff; color: var(--ink); border: 1.5px solid var(--line); width: auto; }
    .btn.secondary:hover { background: var(--surf); }
    .btn.danger { background: #fff; color: #c0392b; border: 1.5px solid #f0d0cc; width: auto; height: 40px; padding: 0 18px; font-size: 0.92rem; }
    .error { color: #c0392b; font-size: 0.92rem; margin-top: 14px; text-align: center; }

    /* App */
    #app-view { display: none; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 44px; padding-bottom: 28px; border-bottom: 1.5px solid var(--line);
    }
    .tabs { display: flex; gap: 10px; margin-bottom: 32px; }
    .tab {
      padding: 13px 26px; border-radius: 999px; border: 1.5px solid var(--line);
      background: #fff; cursor: pointer; font-weight: 700; font-size: 1rem; color: var(--muted);
      transition: all 0.15s;
    }
    .tab:hover { border-color: var(--accent); color: var(--accent); }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .panel { display: none; }
    .panel.active { display: block; }
    .list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 20px; margin-bottom: 24px; }
    .card {
      background: #fff; border-radius: var(--r); padding: 28px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.06);
      border: 1px solid var(--line);
    }
    .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .card-head span {
      font-size: 0.85rem; color: var(--accent); font-weight: 800;
      background: var(--accent-dim); padding: 5px 12px; border-radius: 999px;
    }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .thumb { width: 100%; max-width: 220px; border-radius: 10px; margin-top: 10px; display: none; }
    .actions { display: flex; align-items: center; gap: 16px; margin-top: 28px; }
    .actions .btn { width: auto; }
    .save-status { font-size: 0.95rem; }
    .save-status.ok { color: var(--accent); font-weight: 600; }
    .save-status.err { color: #c0392b; font-weight: 600; }
    .add-row { text-align: center; margin: 0 0 28px; }
    .add-row .btn { width: auto; padding: 0 32px; }
  </style>
</head>
<body>

  <div id="login-view">
    <div class="login-card">
      <h1>정다운교회 관리자</h1>
      <form id="login-form">
        <div class="field">
          <label>아이디</label>
          <input type="text" id="login-username" autocomplete="username" required />
        </div>
        <div class="field">
          <label>비밀번호</label>
          <input type="password" id="login-password" autocomplete="current-password" required />
        </div>
        <button class="btn" type="submit">로그인</button>
        <p class="error" id="login-error" style="display:none;"></p>
      </form>
    </div>
  </div>

  <div id="app-view">
    <div class="wrap">
      <div class="topbar">
        <div>
          <h1>정다운교회 관리자</h1>
          <p class="sub" style="margin:0;">공지사항 · 교회소식을 수정하고 저장하면 사이트에 자동 반영됩니다.</p>
        </div>
        <button class="btn secondary" id="logout-btn">로그아웃</button>
      </div>

      <div class="tabs">
        <div class="tab active" data-tab="news">교회소식</div>
        <div class="tab" data-tab="notices">공지사항</div>
      </div>

      <div class="panel active" id="panel-news">
        <div id="news-list" class="list-grid"></div>
        <div class="add-row"><button class="btn secondary" id="news-add">+ 새 소식 추가</button></div>
        <div class="actions">
          <button class="btn" id="news-save" style="width:auto;">교회소식 저장</button>
          <span class="save-status" id="news-status"></span>
        </div>
      </div>

      <div class="panel" id="panel-notices">
        <div id="notices-list" class="list-grid"></div>
        <div class="add-row"><button class="btn secondary" id="notices-add">+ 새 공지 추가</button></div>
        <div class="actions">
          <button class="btn" id="notices-save" style="width:auto;">공지사항 저장</button>
          <span class="save-status" id="notices-status"></span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const loginView = document.getElementById('login-view');
    const appView = document.getElementById('app-view');

    async function checkSession() {
      try {
        const res = await fetch('/api/admin/session');
        const data = await res.json();
        return !!data.authenticated;
      } catch { return false; }
    }

    async function showApp() {
      loginView.style.display = 'none';
      appView.style.display = 'block';
      await Promise.all([loadNews(), loadNotices()]);
    }

    function showLogin() {
      loginView.style.display = 'flex';
      appView.style.display = 'none';
    }

    (async () => {
      if (await checkSession()) showApp(); else showLogin();
    })();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;
      const errEl = document.getElementById('login-error');
      errEl.style.display = 'none';
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '로그인 실패');
        showApp();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
      }
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/api/admin/logout', { method: 'POST' });
      showLogin();
    });

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active');
      });
    });

    const bust = () => `?t=${Date.now()}`;

    // ---- 교회소식 ----
    let newsItems = [];
    async function loadNews() {
      const res = await fetch('/data/news.json' + bust(), { cache: 'no-store' });
      const data = await res.json().catch(() => ({ items: [] }));
      newsItems = (data.items || []).slice().sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      renderNews();
    }

    function renderNews() {
      const list = document.getElementById('news-list');
      list.innerHTML = '';
      newsItems.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-head"><span>#${i + 1}</span><button class="btn danger" data-i="${i}">삭제</button></div>
          <div class="field"><label>제목</label><input type="text" data-field="title" value="${escapeAttr(item.title || '')}" /></div>
          <div class="row2">
            <div class="field"><label>날짜</label><input type="date" data-field="date" value="${escapeAttr(item.date || '')}" /></div>
            <div class="field"><label>분류</label>
              <select data-field="tag">
                ${['공지','행사','선교','교육','소식'].map(t => `<option value="${t}" ${item.tag === t ? 'selected' : ''}>${t}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="field">
            <label>대표 사진 (선택)</label>
            <input type="file" accept="image/*" data-field="imageFile" />
            <img class="thumb" src="${item.image ? escapeAttr(item.image) : ''}" style="${item.image ? 'display:block;' : ''}" />
          </div>
          <div class="field"><label>영상 URL (유튜브 등, 선택)</label><input type="url" placeholder="https://youtube.com/watch?v=..." data-field="video" value="${escapeAttr(item.video || '')}" /></div>
          <div class="field"><label>내용 (선택)</label><textarea data-field="body">${escapeHtml(item.body || '')}</textarea></div>
        `;
        card.querySelector('[data-i]').addEventListener('click', () => { newsItems.splice(i, 1); renderNews(); });
        card.querySelector('[data-field="title"]').addEventListener('input', e => item.title = e.target.value);
        card.querySelector('[data-field="date"]').addEventListener('input', e => item.date = e.target.value);
        card.querySelector('[data-field="tag"]').addEventListener('change', e => item.tag = e.target.value);
        card.querySelector('[data-field="video"]').addEventListener('input', e => item.video = e.target.value);
        card.querySelector('[data-field="body"]').addEventListener('input', e => item.body = e.target.value);
        const fileInput = card.querySelector('[data-field="imageFile"]');
        const thumb = card.querySelector('.thumb');
        fileInput.addEventListener('change', async () => {
          const file = fileInput.files[0];
          if (!file) return;
          const dataUrl = await readAsDataURL(file);
          thumb.src = dataUrl;
          thumb.style.display = 'block';
          item._pendingFile = file;
        });
        list.appendChild(card);
      });
    }

    document.getElementById('news-add').addEventListener('click', () => {
      newsItems.unshift({ title: '', date: new Date().toISOString().slice(0, 10), tag: '소식', image: '', video: '', body: '' });
      renderNews();
    });

    document.getElementById('news-save').addEventListener('click', async () => {
      const statusEl = document.getElementById('news-status');
      statusEl.textContent = '저장 중...'; statusEl.className = 'save-status';
      try {
        for (const item of newsItems) {
          if (item._pendingFile) {
            const dataBase64 = await readAsBase64(item._pendingFile);
            const res = await fetch('/api/admin/upload', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ filename: item._pendingFile.name, dataBase64 })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || '이미지 업로드 실패');
            item.image = data.path;
            delete item._pendingFile;
          }
        }
        const clean = newsItems.map(({ title, date, tag, image, video, body }) => ({ title, date, tag, image, video, body }));
        const res = await fetch('/api/admin/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ collection: 'news', items: clean })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '저장 실패');
        statusEl.textContent = '저장되었습니다. 잠시 후 사이트에 반영됩니다.'; statusEl.className = 'save-status ok';
      } catch (err) {
        statusEl.textContent = err.message; statusEl.className = 'save-status err';
      }
    });

    // ---- 공지사항 ----
    let noticeItems = [];
    async function loadNotices() {
      const res = await fetch('/data/notices.json' + bust(), { cache: 'no-store' });
      const data = await res.json().catch(() => ({ items: [] }));
      noticeItems = (data.items || []).slice().sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      renderNotices();
    }

    function renderNotices() {
      const list = document.getElementById('notices-list');
      list.innerHTML = '';
      noticeItems.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-head"><span>#${i + 1}</span><button class="btn danger" data-i="${i}">삭제</button></div>
          <div class="field"><label>제목</label><input type="text" data-field="title" value="${escapeAttr(item.title || '')}" /></div>
          <div class="field"><label>날짜</label><input type="date" data-field="date" value="${escapeAttr(item.date || '')}" /></div>
          <div class="field">
            <label>사진 (선택)</label>
            <input type="file" accept="image/*" data-field="imageFile" />
            <img class="thumb" src="${item.image ? escapeAttr(item.image) : ''}" style="${item.image ? 'display:block;' : ''}" />
          </div>
          <div class="field"><label>영상 URL (유튜브 등, 선택)</label><input type="url" placeholder="https://youtube.com/watch?v=..." data-field="video" value="${escapeAttr(item.video || '')}" /></div>
          <div class="field"><label>내용 (선택)</label><textarea data-field="body">${escapeHtml(item.body || '')}</textarea></div>
        `;
        card.querySelector('[data-i]').addEventListener('click', () => { noticeItems.splice(i, 1); renderNotices(); });
        card.querySelector('[data-field="title"]').addEventListener('input', e => item.title = e.target.value);
        card.querySelector('[data-field="date"]').addEventListener('input', e => item.date = e.target.value);
        card.querySelector('[data-field="video"]').addEventListener('input', e => item.video = e.target.value);
        card.querySelector('[data-field="body"]').addEventListener('input', e => item.body = e.target.value);
        const fileInput = card.querySelector('[data-field="imageFile"]');
        const thumb = card.querySelector('.thumb');
        fileInput.addEventListener('change', async () => {
          const file = fileInput.files[0];
          if (!file) return;
          const dataUrl = await readAsDataURL(file);
          thumb.src = dataUrl;
          thumb.style.display = 'block';
          item._pendingFile = file;
        });
        list.appendChild(card);
      });
    }

    document.getElementById('notices-add').addEventListener('click', () => {
      noticeItems.unshift({ title: '', date: new Date().toISOString().slice(0, 10), image: '', video: '', body: '' });
      renderNotices();
    });

    document.getElementById('notices-save').addEventListener('click', async () => {
      const statusEl = document.getElementById('notices-status');
      statusEl.textContent = '저장 중...'; statusEl.className = 'save-status';
      try {
        for (const item of noticeItems) {
          if (item._pendingFile) {
            const dataBase64 = await readAsBase64(item._pendingFile);
            const res = await fetch('/api/admin/upload', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ filename: item._pendingFile.name, dataBase64 })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || '이미지 업로드 실패');
            item.image = data.path;
            delete item._pendingFile;
          }
        }
        const clean = noticeItems.map(({ title, date, image, video, body }) => ({ title, date, image, video, body }));
        const res = await fetch('/api/admin/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ collection: 'notices', items: clean })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '저장 실패');
        statusEl.textContent = '저장되었습니다. 잠시 후 사이트에 반영됩니다.'; statusEl.className = 'save-status ok';
      } catch (err) {
        statusEl.textContent = err.message; statusEl.className = 'save-status err';
      }
    });

    // ---- helpers ----
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }
    function escapeAttr(s) { return escapeHtml(s); }
    function readAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    async function readAsBase64(file) {
      const dataUrl = await readAsDataURL(file);
      return dataUrl.split(',')[1];
    }
  </script>
</body>
</html>
