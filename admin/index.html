<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>정다운교회 관리자</title>
  <link rel="icon" href="/img/logo.jpg" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    :root {
      --accent: #3d7a56;
      --accent-dim: rgba(61, 122, 86, 0.10);
      --ink: #17201b;
      --muted: #6b7a70;
      --line: #e3e8e4;
      --surf: #f3f7f5;
      --r: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--surf);
      color: var(--ink);
      font-size: 16px;
    }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 56px 48px 100px; }
    h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 6px; }
    .sub { color: var(--muted); font-size: 1rem; margin: 0; }

    /* Login */
    #login-view { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card {
      width: 100%; max-width: 400px;
      background: #fff; border-radius: 20px; padding: 52px 44px;
      box-shadow: 0 12px 44px rgba(0,0,0,0.10);
    }
    .login-card h1 { text-align: center; margin-bottom: 32px; font-size: 1.5rem; }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 0.92rem; font-weight: 700; margin-bottom: 8px; color: var(--muted); }
    .field input, .field textarea, .field select {
      width: 100%; height: 48px; padding: 0 16px; border: 1.5px solid var(--line); border-radius: 10px;
      font-family: inherit; font-size: 1rem; background: #fff; color: var(--ink);
      transition: border-color 0.15s;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      outline: none; border-color: var(--accent);
    }
    .field textarea { height: auto; padding: 12px 16px; resize: vertical; min-height: 90px; line-height: 1.6; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      height: 52px; padding: 0 28px; border-radius: 10px; border: none;
      background: var(--accent); color: #fff; font-weight: 700; font-size: 1.02rem;
      cursor: pointer; width: 100%; text-decoration: none;
      transition: background 0.15s, transform 0.15s;
    }
    .btn:hover { background: #2e6040; }
    .btn:active { transform: scale(0.98); }
    .btn.secondary { background: #fff; color: var(--ink); border: 1.5px solid var(--line); width: auto; }
    .btn.secondary:hover { background: var(--surf); }
    .btn.danger { background: #fff; color: #c0392b; border: 1.5px solid #f0d0cc; width: auto; height: 40px; padding: 0 18px; font-size: 0.92rem; }
    .error { color: #c0392b; font-size: 0.92rem; margin-top: 14px; text-align: center; }

    /* App */
    #app-view { display: none; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px; padding-bottom: 28px; border-bottom: 1.5px solid var(--line);
    }
    .topbar-actions { display: flex; gap: 10px; }
    .topbar-actions .btn { height: 44px; font-size: 0.95rem; padding: 0 20px; }

    .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 14px; }
    .toolbar-right { display: flex; align-items: center; gap: 14px; }
    .quick-add {
      height: 44px; padding: 0 22px; border-radius: 999px; border: none;
      background: var(--accent); color: #fff; font-size: 0.95rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      box-shadow: 0 4px 14px rgba(61,122,86,0.35); flex-shrink: 0; font-family: inherit;
      transition: background 0.15s, transform 0.15s;
    }
    .quick-add:hover { background: #2e6040; transform: scale(1.03); }
    .tabs { display: flex; gap: 10px; }
    .tab {
      padding: 13px 26px; border-radius: 999px; border: 1.5px solid var(--line);
      background: #fff; cursor: pointer; font-weight: 700; font-size: 1rem; color: var(--muted);
      transition: all 0.15s;
    }
    .tab:hover { border-color: var(--accent); color: var(--accent); }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .view-toggle { display: flex; gap: 4px; background: #fff; border: 1.5px solid var(--line); border-radius: 12px; padding: 4px; }
    .view-toggle button {
      border: none; background: transparent; cursor: pointer;
      padding: 9px 16px; border-radius: 8px; font-size: 0.9rem; font-weight: 700; color: var(--muted);
      display: inline-flex; align-items: center; gap: 6px; font-family: inherit;
    }
    .view-toggle button.active { background: var(--accent); color: #fff; }

    .panel { display: none; }
    .panel.active { display: block; }
    .list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 20px; }
    #app-view.view-list .list-grid { grid-template-columns: 1fr; }

    .add-card {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; min-height: 320px;
      border: 2.5px dashed var(--line); border-radius: var(--r);
      background: transparent; cursor: pointer; color: var(--muted);
      font-weight: 700; font-size: 1.05rem; width: 100%;
      transition: all 0.15s;
    }
    .add-card:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    #app-view.view-list .add-card { display: none; }
    .add-card .plus { font-size: 2.6rem; line-height: 1; font-weight: 300; }

    .card {
      background: #fff; border-radius: var(--r); padding: 28px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.06);
      border: 1px solid var(--line);
    }
    .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 12px; }
    .card-head span {
      font-size: 0.85rem; color: var(--accent); font-weight: 800;
      background: var(--accent-dim); padding: 5px 12px; border-radius: 999px;
    }
    .card-head-actions { display: flex; align-items: center; gap: 8px; }
    .card-head-actions .btn { width: auto; height: 36px; padding: 0 18px; font-size: 0.88rem; }
    .card-head-actions .btn.danger { height: 36px; padding: 0 16px; font-size: 0.85rem; }
    .card-head-left { display: flex; align-items: center; gap: 10px; }
    .drag-handle {
      cursor: grab; color: var(--muted); font-size: 1.1rem; line-height: 1;
      padding: 4px 2px; user-select: none;
    }
    .drag-handle:active { cursor: grabbing; }
    .card.dragging { opacity: 0.4; }
    .card.drag-over { outline: 2.5px dashed var(--accent); outline-offset: 4px; }
    .card-head-actions .btn.preview-btn { background: #fff; color: var(--ink); border: 1.5px solid var(--line); }
    .card-head-actions .btn.preview-btn:hover { background: var(--surf); }
    .preview-wrap { margin-top: 16px; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; display: none; }
    .preview-wrap.open { display: block; }
    .preview-wrap iframe { width: 100%; border: none; display: block; background: #fff; }

    .card-summary { display: none; }
    #app-view.view-list .card-summary {
      display: flex; align-items: center; justify-content: space-between; gap: 14px;
      cursor: pointer; user-select: none;
    }
    #app-view.view-list .card-summary-title {
      font-weight: 700; font-size: 1.05rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #app-view.view-list .card-summary-meta { display: flex; align-items: center; gap: 12px; flex-shrink: 0; color: var(--muted); font-size: 0.9rem; }
    #app-view.view-list .card-summary-chevron { transition: transform 0.2s; color: var(--muted); }
    #app-view.view-list .card.expanded .card-summary-chevron { transform: rotate(180deg); }
    #app-view.view-list .card-fields { display: none; margin-top: 20px; }
    #app-view.view-list .card.expanded .card-fields { display: block; }
    #app-view.view-list .card-summary { margin-bottom: 4px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .tag-custom { margin-top: 8px; }

    .thumb-wrap { position: relative; display: inline-block; margin-top: 10px; }
    .thumb { width: 100%; max-width: 220px; border-radius: 10px; display: none; }
    .thumb-del {
      position: absolute; top: 6px; right: 6px;
      width: 28px; height: 28px; border-radius: 50%; border: none;
      background: rgba(20,20,20,0.68); color: #fff; cursor: pointer;
      display: none; align-items: center; justify-content: center; font-size: 1rem; line-height: 1;
      opacity: 0; transition: opacity 0.15s;
    }
    .thumb-wrap:hover .thumb-del { opacity: 1; }

    .card-footer { margin-top: 14px; }
    .save-status { font-size: 0.85rem; }
    .save-status.ok { color: var(--accent); font-weight: 700; }
    .save-status.err { color: #c0392b; font-weight: 700; }

    .toast {
      position: fixed; top: 28px; left: 50%; transform: translateX(-50%);
      z-index: 999; padding: 16px 28px; border-radius: 12px;
      font-weight: 700; font-size: 1rem; color: #fff;
      background: var(--accent); box-shadow: 0 8px 28px rgba(0,0,0,0.18);
      animation: toast-in 0.2s ease;
    }
    .toast.err { background: #c0392b; }
    @keyframes toast-in { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  </style>
</head>
<body>

  <div id="login-view">
    <div class="login-card">
      <h1>정다운교회 관리자</h1>
      <form id="login-form">
        <div class="field">
          <label>아이디</label>
          <input type="text" id="login-username" autocomplete="username" required />
        </div>
        <div class="field">
          <label>비밀번호</label>
          <input type="password" id="login-password" autocomplete="current-password" required />
        </div>
        <button class="btn" type="submit">로그인</button>
        <p class="error" id="login-error" style="display:none;"></p>
      </form>
    </div>
  </div>

  <div id="app-view" class="view-list">
    <div id="toast" class="toast" hidden></div>
    <div class="wrap">
      <div class="topbar">
        <div>
          <h1>정다운교회 관리자</h1>
          <p class="sub">공지사항 · 교회소식을 수정하고 저장하면 사이트에 자동 반영됩니다.</p>
        </div>
        <div class="topbar-actions">
          <a href="/" class="btn secondary">홈으로 돌아가기</a>
          <button class="btn secondary" id="logout-btn">로그아웃</button>
        </div>
      </div>

      <div class="toolbar">
        <div class="tabs">
          <div class="tab active" data-tab="news">교회소식</div>
          <div class="tab" data-tab="notices">공지사항</div>
        </div>
        <div class="toolbar-right">
          <button type="button" class="quick-add" id="quick-add">+ 새 항목 추가하기</button>
          <div class="view-toggle">
            <button type="button" data-view="grid">⊞ 그리드</button>
            <button type="button" data-view="list" class="active">☰ 나열</button>
          </div>
        </div>
      </div>

      <div class="panel active" id="panel-news">
        <div id="news-list" class="list-grid"></div>
      </div>

      <div class="panel" id="panel-notices">
        <div id="notices-list" class="list-grid"></div>
      </div>
    </div>
  </div>

  <script>
    const loginView = document.getElementById('login-view');
    const appView = document.getElementById('app-view');

    async function checkSession() {
      try {
        const res = await fetch('/api/admin/session');
        const data = await res.json();
        return !!data.authenticated;
      } catch { return false; }
    }

    async function showApp() {
      loginView.style.display = 'none';
      appView.style.display = 'block';
      await Promise.all([loadNews(), loadNotices()]);
    }

    function showLogin() {
      loginView.style.display = 'flex';
      appView.style.display = 'none';
    }

    (async () => {
      if (await checkSession()) showApp(); else showLogin();
    })();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;
      const errEl = document.getElementById('login-error');
      errEl.style.display = 'none';
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '로그인 실패');
        showApp();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
      }
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/api/admin/logout', { method: 'POST' });
      showLogin();
    });

    // Tabs
    const quickAddBtn = document.getElementById('quick-add');
    const QUICK_ADD_LABELS = { news: '+ 새 교회소식 추가', notices: '+ 새 공지 추가' };
    function updateQuickAddLabel() {
      const activeTab = document.querySelector('.tab.active').dataset.tab;
      quickAddBtn.textContent = QUICK_ADD_LABELS[activeTab];
    }
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active');
        updateQuickAddLabel();
      });
    });
    updateQuickAddLabel();

    let toastTimer = null;
    function showToast(msg, type, duration) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast' + (type === 'err' ? ' err' : '');
      toast.hidden = false;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.hidden = true; }, duration || 2600);
    }

    function expandFirstCard(listId) {
      const firstCard = document.querySelector(`#${listId} .card`);
      if (firstCard) firstCard.classList.add('expanded');
    }

    document.getElementById('quick-add').addEventListener('click', () => {
      const activeTab = document.querySelector('.tab.active').dataset.tab;
      if (activeTab === 'news') {
        newsItems.unshift({ title: '', date: todayStr(), tag: '소식', image: '', body: '' });
        renderNews();
        expandFirstCard('news-list');
      } else {
        noticeItems.unshift({ title: '', date: todayStr(), image: '', body: '' });
        renderNotices();
        expandFirstCard('notices-list');
      }
    });

    // View toggle (그리드 / 나열)
    document.querySelectorAll('.view-toggle button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        appView.classList.toggle('view-list', btn.dataset.view === 'list');
      });
    });

    const bust = () => `?t=${Date.now()}`;
    const todayStr = () => new Date().toISOString().slice(0, 10);
    const TAG_PRESETS = ['공지', '행사', '선교', '교육', '소식'];

    async function uploadPendingFile(item) {
      if (!item._pendingFile) return;
      const dataBase64 = await readAsBase64(item._pendingFile);
      const res = await fetch('/api/admin/upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename: item._pendingFile.name, dataBase64 })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '이미지 업로드 실패');
      item.image = data.path;
      delete item._pendingFile;
    }

    // ---- 교회소식 ----
    let newsItems = [];
    async function loadNews() {
      const res = await fetch('/data/news.json' + bust(), { cache: 'no-store' });
      const data = await res.json().catch(() => ({ items: [] }));
      newsItems = (data.items || []).slice();
      renderNews();
    }

    // ---- 드래그 정렬 ----
    let dragSrcIndex = null;
    function attachDragReorder(card, index, items, rerender) {
      const handle = card.querySelector('.drag-handle');
      handle.addEventListener('mousedown', () => { card.draggable = true; });
      card.addEventListener('dragend', () => {
        card.draggable = false;
        card.classList.remove('dragging');
        document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      });
      card.addEventListener('dragstart', (e) => {
        dragSrcIndex = index;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(index));
      });
      card.addEventListener('dragover', (e) => {
        e.preventDefault();
        card.classList.add('drag-over');
      });
      card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
      card.addEventListener('drop', (e) => {
        e.preventDefault();
        card.classList.remove('drag-over');
        if (dragSrcIndex === null || dragSrcIndex === index) return;
        const [moved] = items.splice(dragSrcIndex, 1);
        items.splice(index, 0, moved);
        dragSrcIndex = null;
        rerender();
      });
    }

    // ---- 미리보기 ----
    const PREVIEW_CSS_LINKS = `
      <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
      <link rel="stylesheet" href="/css/style.css">
    `;
    function buildNewsPreviewSrcdoc(item) {
      const img = item.image ? `<img src="${escapeAttr(item.image)}" alt="" />` : '';
      const media = item.image
        ? (item.video
          ? `<a class="news-img news-img--video" href="${escapeAttr(item.video)}">${img}<span class="news-play"></span></a>`
          : `<div class="news-img">${img}</div>`)
        : '';
      return `<!DOCTYPE html><html><head><meta charset="utf-8">${PREVIEW_CSS_LINKS}
        <style>body{margin:0;padding:20px;background:#f3f7f5;} .news-grid{display:block;max-width:320px;}</style>
        </head><body>
        <div class="news-grid">
          <article class="news-card">
            ${media}
            <div class="news-body">
              <span class="news-tag">${escapeHtml(item.tag || '소식')}</span>
              <h3 class="news-title">${escapeHtml(item.title || '제목을 입력해주세요')}</h3>
              ${item.body ? `<p class="news-summary">${escapeHtml(item.body)}</p>` : ''}
              <p class="news-date">${escapeHtml(item.date || '')}</p>
            </div>
          </article>
        </div>
        </body></html>`;
    }
    function buildNoticePreviewSrcdoc(item) {
      const hasExtra = !!(item.image || item.body || item.video);
      const summary = `<span class="notice-item-date">${escapeHtml(item.date || '')}</span><p class="notice-item-title">${escapeHtml(item.title || '제목을 입력해주세요')}</p>`;
      const bodyHtml = hasExtra
        ? `<details class="notice-item" open><summary>${summary}</summary><div class="notice-item-extra">
            ${item.image ? `<img class="notice-item-img" src="${escapeAttr(item.image)}" alt="" />` : ''}
            ${item.body ? `<p class="notice-item-body">${escapeHtml(item.body)}</p>` : ''}
            ${item.video ? `<a class="notice-item-video" href="${escapeAttr(item.video)}">영상 보기</a>` : ''}
          </div></details>`
        : `<li class="notice-item">${summary}</li>`;
      return `<!DOCTYPE html><html><head><meta charset="utf-8">${PREVIEW_CSS_LINKS}
        <style>body{margin:0;padding:20px;background:#f3f7f5;} .notice-list{list-style:none;max-width:320px;background:#fff;border-radius:14px;overflow:hidden;border:1px solid #e3e8e4;margin:0;padding:0;}</style>
        </head><body>
        <ul class="notice-list">${bodyHtml}</ul>
        </body></html>`;
    }
    function attachPreview(card, item, buildSrcdoc) {
      const btn = card.querySelector('[data-preview]');
      const wrap = card.querySelector('.preview-wrap');
      const iframe = wrap.querySelector('.preview-frame');
      btn.addEventListener('click', () => {
        const opening = !wrap.classList.contains('open');
        wrap.classList.toggle('open', opening);
        btn.textContent = opening ? '미리보기 닫기' : '미리보기';
        if (opening) {
          iframe.srcdoc = buildSrcdoc(item);
          iframe.style.height = '0px';
          iframe.onload = () => {
            try {
              iframe.style.height = (iframe.contentWindow.document.body.scrollHeight + 20) + 'px';
            } catch (_) { iframe.style.height = '400px'; }
          };
        }
      });
    }

    function makeAddCard(label, onAdd) {
      const addCard = document.createElement('button');
      addCard.type = 'button';
      addCard.className = 'add-card';
      addCard.innerHTML = `<span class="plus">+</span><span>${label}</span>`;
      addCard.addEventListener('click', onAdd);
      return addCard;
    }

    function renderNews() {
      const list = document.getElementById('news-list');
      list.innerHTML = '';

      newsItems.forEach((item, i) => {
        const isCustomTag = !!item.tag && !TAG_PRESETS.includes(item.tag);
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-summary" data-toggle>
            <span class="card-summary-title">${escapeHtml(item.title || '제목을 입력해주세요')}</span>
            <span class="card-summary-meta"><span>${escapeHtml(item.date || '')}</span><span class="card-summary-chevron">⌄</span></span>
          </div>
          <div class="card-fields">
            <div class="card-head">
              <div class="card-head-left">
                <span class="drag-handle" title="드래그하여 순서 변경">⠿⠿</span>
                <span>#${i + 1}</span>
              </div>
              <div class="card-head-actions">
                <button class="btn preview-btn" data-preview>미리보기</button>
                <button class="btn" data-save>저장</button>
                <button class="btn danger" data-i="${i}">삭제</button>
              </div>
            </div>
            <div class="field"><label>제목</label><input type="text" data-field="title" value="${escapeAttr(item.title || '')}" /></div>
            <div class="row2">
              <div class="field"><label>날짜</label><input type="date" data-field="date" value="${escapeAttr(item.date || '')}" /></div>
              <div class="field">
                <label>분류</label>
                <select data-field="tag">
                  ${TAG_PRESETS.map(t => `<option value="${t}" ${item.tag === t ? 'selected' : ''}>${t}</option>`).join('')}
                  <option value="__custom__" ${isCustomTag ? 'selected' : ''}>기타</option>
                </select>
                <input type="text" class="tag-custom" data-field="tagCustom" placeholder="분류 직접 입력"
                  value="${isCustomTag ? escapeAttr(item.tag) : ''}"
                  style="${isCustomTag ? 'display:block;' : 'display:none;'}" />
              </div>
            </div>
            <div class="field">
              <label>대표 사진 (선택)</label>
              <input type="file" accept="image/*" data-field="imageFile" />
              <div class="thumb-wrap">
                <img class="thumb" src="${item.image ? escapeAttr(item.image) : ''}" style="${item.image ? 'display:block;' : ''}" />
                <button type="button" class="thumb-del" style="${item.image ? 'display:flex;' : ''}" title="사진 삭제">×</button>
              </div>
            </div>
            <div class="field"><label>내용 (선택)</label><textarea data-field="body">${escapeHtml(item.body || '')}</textarea></div>
            <div class="preview-wrap"><iframe class="preview-frame"></iframe></div>
            <div class="card-footer">
              <span class="save-status"></span>
            </div>
          </div>
        `;
        const summaryTitle = card.querySelector('.card-summary-title');
        const summaryDate = card.querySelector('.card-summary-meta span');
        card.querySelector('[data-toggle]').addEventListener('click', () => card.classList.toggle('expanded'));
        card.querySelector('[data-i]').addEventListener('click', async () => {
          if (!confirm('삭제하시겠습니까?')) return;
          newsItems.splice(i, 1);
          renderNews();
          try {
            await persistNews();
            showToast('삭제되었습니다.');
          } catch (err) {
            showToast('삭제 저장 중 오류: ' + err.message, 'err');
          }
        });
        card.querySelector('[data-field="title"]').addEventListener('input', e => { item.title = e.target.value; summaryTitle.textContent = item.title || '제목을 입력해주세요'; });
        card.querySelector('[data-field="date"]').addEventListener('input', e => { item.date = e.target.value; summaryDate.textContent = item.date; });
        card.querySelector('[data-field="body"]').addEventListener('input', e => item.body = e.target.value);

        const tagSelect = card.querySelector('[data-field="tag"]');
        const tagCustom = card.querySelector('[data-field="tagCustom"]');
        tagSelect.addEventListener('change', e => {
          if (e.target.value === '__custom__') {
            tagCustom.style.display = 'block';
            tagCustom.focus();
            item.tag = tagCustom.value || '';
          } else {
            tagCustom.style.display = 'none';
            item.tag = e.target.value;
          }
        });
        tagCustom.addEventListener('input', e => { item.tag = e.target.value; });

        const fileInput = card.querySelector('[data-field="imageFile"]');
        const thumb = card.querySelector('.thumb');
        const thumbDel = card.querySelector('.thumb-del');
        fileInput.addEventListener('change', async () => {
          const file = fileInput.files[0];
          if (!file) return;
          const dataUrl = await readAsDataURL(file);
          thumb.src = dataUrl;
          thumb.style.display = 'block';
          thumbDel.style.display = 'flex';
          item._pendingFile = file;
        });
        thumbDel.addEventListener('click', () => {
          item.image = '';
          delete item._pendingFile;
          fileInput.value = '';
          thumb.src = '';
          thumb.style.display = 'none';
          thumbDel.style.display = 'none';
        });

        const statusEl = card.querySelector('.save-status');
        card.querySelector('[data-save]').addEventListener('click', () => saveNews(statusEl));

        attachDragReorder(card, i, newsItems, renderNews);
        attachPreview(card, item, buildNewsPreviewSrcdoc);

        list.appendChild(card);
      });

      list.appendChild(makeAddCard('새 소식 추가', () => {
        newsItems.unshift({ title: '', date: todayStr(), tag: '소식', image: '', body: '' });
        renderNews();
        expandFirstCard('news-list');
      }));
    }

    async function persistNews() {
      for (const item of newsItems) await uploadPendingFile(item);
      const clean = newsItems.map(({ title, date, tag, image, body }) => ({ title, date, tag, image, body }));
      const res = await fetch('/api/admin/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ collection: 'news', items: clean })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '저장 실패');
    }

    async function saveNews(statusEl) {
      statusEl.textContent = '저장 중...'; statusEl.className = 'save-status';
      try {
        await persistNews();
        statusEl.textContent = ''; statusEl.className = 'save-status';
        showToast('저장이 완료되었습니다. 사이트 반영까지 1~2분 정도 걸릴 수 있어요.', null, 3800);
      } catch (err) {
        statusEl.textContent = ''; statusEl.className = 'save-status';
        showToast(err.message, 'err');
      }
    }

    // ---- 공지사항 ----
    let noticeItems = [];
    async function loadNotices() {
      const res = await fetch('/data/notices.json' + bust(), { cache: 'no-store' });
      const data = await res.json().catch(() => ({ items: [] }));
      noticeItems = (data.items || []).slice();
      renderNotices();
    }

    function renderNotices() {
      const list = document.getElementById('notices-list');
      list.innerHTML = '';

      noticeItems.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-summary" data-toggle>
            <span class="card-summary-title">${escapeHtml(item.title || '제목을 입력해주세요')}</span>
            <span class="card-summary-meta"><span>${escapeHtml(item.date || '')}</span><span class="card-summary-chevron">⌄</span></span>
          </div>
          <div class="card-fields">
            <div class="card-head">
              <div class="card-head-left">
                <span class="drag-handle" title="드래그하여 순서 변경">⠿⠿</span>
                <span>#${i + 1}</span>
              </div>
              <div class="card-head-actions">
                <button class="btn preview-btn" data-preview>미리보기</button>
                <button class="btn" data-save>저장</button>
                <button class="btn danger" data-i="${i}">삭제</button>
              </div>
            </div>
            <div class="field"><label>제목</label><input type="text" data-field="title" value="${escapeAttr(item.title || '')}" /></div>
            <div class="field"><label>날짜</label><input type="date" data-field="date" value="${escapeAttr(item.date || '')}" /></div>
            <div class="field">
              <label>사진 (선택)</label>
              <input type="file" accept="image/*" data-field="imageFile" />
              <div class="thumb-wrap">
                <img class="thumb" src="${item.image ? escapeAttr(item.image) : ''}" style="${item.image ? 'display:block;' : ''}" />
                <button type="button" class="thumb-del" style="${item.image ? 'display:flex;' : ''}" title="사진 삭제">×</button>
              </div>
            </div>
            <div class="field"><label>내용 (선택)</label><textarea data-field="body">${escapeHtml(item.body || '')}</textarea></div>
            <div class="preview-wrap"><iframe class="preview-frame"></iframe></div>
            <div class="card-footer">
              <span class="save-status"></span>
            </div>
          </div>
        `;
        const summaryTitle = card.querySelector('.card-summary-title');
        const summaryDate = card.querySelector('.card-summary-meta span');
        card.querySelector('[data-toggle]').addEventListener('click', () => card.classList.toggle('expanded'));
        card.querySelector('[data-i]').addEventListener('click', async () => {
          if (!confirm('삭제하시겠습니까?')) return;
          noticeItems.splice(i, 1);
          renderNotices();
          try {
            await persistNotices();
            showToast('삭제되었습니다.');
          } catch (err) {
            showToast('삭제 저장 중 오류: ' + err.message, 'err');
          }
        });
        card.querySelector('[data-field="title"]').addEventListener('input', e => { item.title = e.target.value; summaryTitle.textContent = item.title || '제목을 입력해주세요'; });
        card.querySelector('[data-field="date"]').addEventListener('input', e => { item.date = e.target.value; summaryDate.textContent = item.date; });
        card.querySelector('[data-field="body"]').addEventListener('input', e => item.body = e.target.value);

        const fileInput = card.querySelector('[data-field="imageFile"]');
        const thumb = card.querySelector('.thumb');
        const thumbDel = card.querySelector('.thumb-del');
        fileInput.addEventListener('change', async () => {
          const file = fileInput.files[0];
          if (!file) return;
          const dataUrl = await readAsDataURL(file);
          thumb.src = dataUrl;
          thumb.style.display = 'block';
          thumbDel.style.display = 'flex';
          item._pendingFile = file;
        });
        thumbDel.addEventListener('click', () => {
          item.image = '';
          delete item._pendingFile;
          fileInput.value = '';
          thumb.src = '';
          thumb.style.display = 'none';
          thumbDel.style.display = 'none';
        });

        const statusEl = card.querySelector('.save-status');
        card.querySelector('[data-save]').addEventListener('click', () => saveNotices(statusEl));

        attachDragReorder(card, i, noticeItems, renderNotices);
        attachPreview(card, item, buildNoticePreviewSrcdoc);

        list.appendChild(card);
      });

      list.appendChild(makeAddCard('새 공지 추가', () => {
        noticeItems.unshift({ title: '', date: todayStr(), image: '', body: '' });
        renderNotices();
        expandFirstCard('notices-list');
      }));
    }

    async function persistNotices() {
      for (const item of noticeItems) await uploadPendingFile(item);
      const clean = noticeItems.map(({ title, date, image, body }) => ({ title, date, image, body }));
      const res = await fetch('/api/admin/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ collection: 'notices', items: clean })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '저장 실패');
    }

    async function saveNotices(statusEl) {
      statusEl.textContent = '저장 중...'; statusEl.className = 'save-status';
      try {
        await persistNotices();
        statusEl.textContent = ''; statusEl.className = 'save-status';
        showToast('저장이 완료되었습니다. 사이트 반영까지 1~2분 정도 걸릴 수 있어요.', null, 3800);
      } catch (err) {
        statusEl.textContent = ''; statusEl.className = 'save-status';
        showToast(err.message, 'err');
      }
    }

    // ---- helpers ----
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }
    function escapeAttr(s) { return escapeHtml(s); }
    function readAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    async function readAsBase64(file) {
      const dataUrl = await readAsDataURL(file);
      return dataUrl.split(',')[1];
    }
  </script>
</body>
</html>
