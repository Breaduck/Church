backend:
  name: github
  repo: Breaduck/Church
  branch: master
  base_url: https://church.pages.dev
  auth_endpoint: /api/auth
  commit_messages:
    create: "소식 추가: {{collection}} “{{slug}}”"
    update: "소식 수정: {{collection}} “{{slug}}”"
    delete: "소식 삭제: {{collection}} “{{slug}}”"
    uploadMedia: "이미지 업로드: {{path}}"
    deleteMedia: "이미지 삭제: {{path}}"

locale: "ko"

media_folder: "img/news"
public_folder: "/img/news"

collections:
  - name: "news"
    label: "교회소식"
    label_singular: "소식"
    description: "홈페이지 '교회소식' 섹션과 상단 종 모양 알림창에 표시됩니다."
    files:
      - file: "data/news.json"
        name: "news_list"
        label: "교회소식 전체 목록"
        format: "json"
        fields:
          - label: "소식 목록"
            name: "items"
            widget: "list"
            summary: "{{fields.date}} · [{{fields.tag}}] {{fields.title}}"
            fields:
              - { label: "제목", name: "title", widget: "string", hint: "예: 여름 수련회 참가 신청" }
              - { label: "날짜", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, picker_utc: false }
              - label: "분류"
                name: "tag"
                widget: "select"
                options: ["공지", "행사", "선교", "교육", "소식"]
                default: "공지"
              - { label: "대표 이미지", name: "image", widget: "image", required: false, hint: "비워두면 기본 이미지가 표시됩니다." }
